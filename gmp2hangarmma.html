<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GMP 2 HANGAR MMA</title>
    <style>
        /* ============================================
           DESIGN SYSTEM - TEMA AZUL - COMPACTADO PARA CELULAR
           Todas as funcionalidades originais preservadas
        ============================================ */
        :root {
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --primary-dark: #1d4ed8;
            --primary-gradient: linear-gradient(135deg, #2563eb, #06b6d4);
            --secondary: #0284c7;
            --success: #10b981;
            --success-dark: #059669;
            --danger: #ef4444;
            --danger-dark: #dc2626;
            --warning: #f59e0b;
            --info: #0ea5e9;
            --bg-body: linear-gradient(135deg, #eff6ff 0%, #e0f2fe 100%);
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #475569;
            --text-light: #94a3b8;
            --border-light: #cbd5e1;
            --border-radius-sm: 6px;
            --border-radius-md: 10px;
            --border-radius-lg: 14px;
            --border-radius-xl: 20px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 2px 4px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 4px 6px -2px rgba(0, 0, 0, 0.1);
            --transition-default: all 0.2s ease;
        }

        body.dark-mode {
            --bg-body: linear-gradient(135deg, #0f172a 0%, #082f49 100%);
            --bg-card: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --text-light: #64748b;
            --border-light: #334155;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 4px;
            line-height: 1.4;
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        .container { 
            max-width: 500px; 
            margin: 0 auto; 
            position: relative; 
        }

        .credits-integrated {
            text-align: center;
            font-size: 0.55rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            display: inline-block;
            padding: 2px 10px;
            border-radius: 30px;
            width: auto;
            margin-left: auto;
            margin-right: auto;
        }

        body.dark-mode .credits-integrated {
            background: rgba(30, 41, 59, 0.5);
        }

        .header-mini {
            position: sticky;
            top: 4px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            padding: 6px 10px;
            border-radius: var(--border-radius-xl);
            box-shadow: var(--shadow-md);
            z-index: 100;
            margin-bottom: 6px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        body.dark-mode .header-mini {
            background: rgba(30, 41, 59, 0.85);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .header-mini-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .page-title-mini {
            margin: 0;
            font-size: 0.8rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.3px;
        }

        .timer-compact {
            background: var(--bg-card);
            color: var(--primary);
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 800;
            border: 1.5px solid var(--primary-light);
            font-family: monospace;
        }

        .timer-warning {
            background: var(--danger) !important;
            color: white !important;
            border-color: var(--danger-dark) !important;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .simulado-info {
            background: rgba(37, 99, 235, 0.08);
            border-radius: var(--border-radius-md);
            padding: 5px 10px;
            margin-bottom: 4px;
            border: 1px solid rgba(37, 99, 235, 0.15);
            font-size: 0.65rem;
        }

        body.dark-mode .simulado-info {
            background: rgba(37, 99, 235, 0.12);
        }

        .simulado-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.6rem;
            font-weight: 600;
            margin-top: 3px;
            color: var(--text-muted);
        }

        .history-controls {
            display: flex;
            gap: 4px;
            margin-top: 5px;
            flex-wrap: wrap;
        }

        .history-controls button {
            padding: 3px 8px;
            border: none;
            border-radius: 25px;
            font-size: 0.55rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-default);
            background: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border-light);
        }

        .history-controls button:hover {
            transform: translateY(-1px);
        }

        .clear-history-btn {
            background: #fef3c7 !important;
            color: #92400e !important;
            border-color: #fde68a !important;
        }

        body.dark-mode .clear-history-btn {
            background: #7c2d12 !important;
            color: #fed7aa !important;
            border-color: #9a3412 !important;
        }

        .info-history-btn {
            background: #e2e8f0 !important;
        }

        .dark-mode-btn {
            background: var(--primary-gradient) !important;
            color: white !important;
            border: none !important;
        }

        .quiz-info-mini {
            background: var(--bg-card);
            border-radius: var(--border-radius-md);
            padding: 6px 10px;
            margin-bottom: 0;
            border: 1px solid var(--border-light);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 6px;
        }

        .info-item {
            text-align: center;
            background: rgba(37, 99, 235, 0.06);
            padding: 4px 2px;
            border-radius: var(--border-radius-sm);
        }

        .info-label { 
            font-size: 0.45rem; 
            color: var(--text-muted); 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }
        .info-value { 
            font-size: 0.75rem; 
            font-weight: 800; 
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls-compact { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap;
            gap: 6px;
        }

        .auto-nav-toggle {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--text-main);
            background: rgba(37, 99, 235, 0.08);
            padding: 3px 8px;
            border-radius: 25px;
            cursor: pointer;
        }

        .reset-btn-mini {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 25px;
            padding: 3px 10px;
            font-size: 0.6rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-main);
        }

        .question-block-mini {
            background: var(--bg-card);
            padding: 10px;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-md);
            margin-top: 6px;
            margin-bottom: 8px;
            animation: slideIn 0.3s ease-out;
            border: 1px solid var(--border-light);
            position: relative;
        }

        @keyframes slideIn { 
            from { opacity: 0; transform: translateY(5px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .question-text-mini {
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-main);
            line-height: 1.4;
        }

        .options-mini { 
            display: flex; 
            flex-direction: column; 
            gap: 5px; 
        }

        .option-mini {
            padding: 7px 10px;
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border-light);
            border-radius: var(--border-radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            font-size: 0.75rem;
            font-weight: 500;
            transition: var(--transition-default);
        }

        body.dark-mode .option-mini {
            background: rgba(255, 255, 255, 0.03);
        }

        .option-mini:hover {
            border-color: var(--primary-light);
            background: rgba(37, 99, 235, 0.05);
        }

        .option-mini input[type="radio"] {
            margin-right: 8px;
            width: 14px;
            height: 14px;
            flex-shrink: 0;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .option-mini:has(input:checked) {
            border-color: var(--primary);
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.08), rgba(6, 182, 212, 0.08));
        }

        .correct-answer {
            background: linear-gradient(135deg, #dcfce7, #bbf7d0) !important;
            border-color: var(--success) !important;
            color: #166534 !important;
        }

        body.dark-mode .correct-answer {
            background: linear-gradient(135deg, #14532d, #166534) !important;
            color: #86efac !important;
        }

        .wrong-answer {
            background: linear-gradient(135deg, #fee2e2, #fecaca) !important;
            border-color: var(--danger) !important;
            color: #991b1b !important;
        }

        body.dark-mode .wrong-answer {
            background: linear-gradient(135deg, #7f1d1d, #991b1b) !important;
            color: #fca5a5 !important;
        }

        .report-btn, .results-report-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.6rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: var(--text-muted);
        }

        .report-btn:hover, .results-report-btn:hover {
            background: var(--danger);
            border-color: var(--danger);
            color: white;
        }

        .nav-buttons { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 6px; 
            margin-bottom: 8px; 
        }

        .nav-btn {
            padding: 8px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-finish {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #94a3b8, #64748b);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.8rem;
            margin-bottom: 12px;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-finish.enabled {
            background: linear-gradient(135deg, var(--success), var(--success-dark));
            cursor: pointer;
            opacity: 1;
        }

        #results {
            background: var(--bg-card);
            border-radius: var(--border-radius-lg);
            padding: 12px 10px;
            text-align: center;
            margin-bottom: 12px;
            border: 1px solid var(--border-light);
            display: none;
        }

        .result-title { 
            font-size: 0.95rem; 
            font-weight: 800; 
            margin-bottom: 4px; 
        }

        .score-mini { 
            font-size: 2rem; 
            font-weight: 900; 
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 5px 0; 
        }

        #final-percent { 
            font-weight: 700; 
            color: var(--primary-light); 
            margin-bottom: 6px; 
            font-size: 0.85rem;
        }

        .motivation-message {
            padding: 8px;
            border-radius: var(--border-radius-md);
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 0.7rem;
            background: linear-gradient(135deg, #fffbeb, #fef3c7);
            border: 1px solid #fde68a;
            color: #92400e;
        }

        body.dark-mode .motivation-message {
            background: linear-gradient(135deg, #451a03, #78350f);
            border-color: #9a3412;
            color: #fde68a;
        }

        .pending-shortcut {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary-gradient);
            color: white;
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 800;
            z-index: 1000;
            display: flex;
            gap: 10px;
            align-items: center;
            border: none;
            cursor: pointer;
        }

        .pending-shortcut .pending-count {
            background: white;
            color: var(--primary);
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 900;
        }

        @media (max-width: 480px) {
            body { padding: 3px; }
            .question-block-mini { padding: 8px; }
            .option-mini { padding: 6px 8px; font-size: 0.7rem; }
            .pending-shortcut { padding: 6px 14px; font-size: 0.7rem; bottom: 12px; }
        }

        .report-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .report-content {
            background: var(--bg-card);
            padding: 16px;
            border-radius: var(--border-radius-xl);
            width: 100%;
            max-width: 450px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .report-title {
            font-size: 1.1rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            text-align: center;
            padding-bottom: 8px;
        }

        .report-question-info {
            background: rgba(37, 99, 235, 0.06);
            border-radius: var(--border-radius-md);
            padding: 10px;
            margin-bottom: 12px;
            border-left: 3px solid var(--primary);
        }

        .report-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            border: 1px solid var(--border-light);
            border-radius: var(--border-radius-md);
            cursor: pointer;
            margin-bottom: 6px;
        }

        .report-option:hover {
            border-color: var(--primary);
            background: rgba(37, 99, 235, 0.05);
        }

        .user-info-form {
            background: rgba(37, 99, 235, 0.05);
            border-radius: var(--border-radius-md);
            padding: 12px;
            margin: 12px 0;
        }

        .form-group {
            margin-bottom: 10px;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .form-input, .report-textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border-light);
            border-radius: var(--border-radius-md);
            font-size: 0.8rem;
            background: var(--bg-card);
            color: var(--text-main);
        }

        .report-textarea {
            min-height: 80px;
            resize: vertical;
        }

        .report-buttons {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .report-submit {
            flex: 2;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 10px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
        }

        .report-cancel {
            flex: 1;
            background: #6b7280;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }

        .report-success {
            background: #dcfce7;
            color: #166534;
            padding: 10px;
            border-radius: var(--border-radius-md);
            text-align: center;
            margin-top: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            display: none;
        }

        .report-error {
            background: #fee2e2;
            color: #991b1b;
            padding: 8px;
            border-radius: var(--border-radius-md);
            margin: 8px 0;
            font-size: 0.75rem;
            display: none;
        }

        .required-star {
            color: var(--danger);
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div class="credits-integrated">BY EWERTON</div>
    
    <div class="header-mini">
        <div class="header-mini-top">
            <h1 class="page-title-mini" id="page-title">Carregando...</h1>
            <div id="timer" class="timer-compact">00:00</div>
        </div>
        
        <div class="simulado-info" id="simulado-info">
            <div>Simulado: <span id="questions-per-simulado">20</span> questões</div>
            <div class="simulado-stats">
                <span id="remaining-questions">Disponíveis: 0</span>
                <span id="recent-used">Usadas: 0</span>
            </div>
            <div class="history-controls">
                <button class="clear-history-btn" onclick="clearHistory()">🗑️ Limpar</button>
                <button class="info-history-btn" onclick="showHistoryInfo()">ℹ️ Info</button>
                <button class="dark-mode-btn" onclick="toggleDarkMode()">🌙 Dark</button>
            </div>
        </div>
        
        <div class="quiz-info-mini">
            <div class="info-grid">
                <div class="info-item"><div class="info-label">Questão</div><div class="info-value" id="question-counter">0/0</div></div>
                <div class="info-item"><div class="info-label">Respondidas</div><div class="info-value" id="answered-counter">0/0</div></div>
                <div class="info-item"><div class="info-label">Progresso</div><div class="info-value" id="progress-percent">0%</div></div>
            </div>
            <div class="controls-compact">
                <div class="auto-nav-toggle" onclick="toggleAutoNav()"><input type="checkbox" id="auto-nav-checkbox" class="auto-nav-checkbox" checked><label>Auto-avançar</label></div>
                <button class="reset-btn-mini" onclick="resetQuiz()">↻ Reiniciar</button>
            </div>
        </div>
    </div>

    <div id="results">
        <div class="result-title" id="feedback-msg"></div>
        <div class="score-mini" id="final-score"></div>
        <div id="final-percent"></div>
        <div id="motivation-message" class="motivation-message"></div>
        <div id="simulado-summary" style="margin-bottom: 8px; font-size: 0.65rem;"></div>
        
        <button id="restart-btn" class="nav-btn" style="display:none;" onclick="startNewQuiz()">🔄 Refazer</button>
        <button id="voltar-inicio-btn" class="nav-btn" style="display:none;" onclick="voltarAoInicio()">🏁 Voltar ao Início</button>
        <button id="continuar-banco-btn" class="nav-btn" style="display:none;" onclick="continuarComBanco()">📚 Continuar com Banco</button>
        <button id="wrong-questions-btn" class="nav-btn" style="display:none;" onclick="startWrongQuestionsSimulado()">⚡ Reforço</button>
        <button id="reiniciar-banco-btn" class="nav-btn" style="display:none;" onclick="reiniciarBancoCompleto()">🔄 Reiniciar Banco</button>
    </div>

    <div id="quiz-content"></div>

    <div class="nav-buttons">
        <button id="prev-btn" class="nav-btn" onclick="prevQuestion()" disabled>← Anterior</button>
        <button id="next-btn" class="nav-btn" onclick="nextQuestion()">Próximo →</button>
    </div>

    <button id="finish-btn" class="btn-finish" onclick="finalizeQuiz()" disabled>FINALIZAR SIMULADO</button>
</div>

<div id="reportModal" class="report-modal">
    <div class="report-content">
        <div class="report-title">📝 Reportar Questão</div>
        <div class="report-question-info">
            <div><strong>Questão #<span id="reportQuestionNumber">1</span></strong></div>
            <div id="reportQuestionText" style="font-size: 0.8rem; margin-top: 5px;">Carregando...</div>
        </div>
        <div class="report-section">
            <div class="report-section-title" style="font-weight:700; margin-bottom:8px;">📌 Tipo de Problema</div>
            <div class="report-options">
                <div class="report-option"><input type="radio" id="reportError" name="reportType" value="error"><label for="reportError">❌ Questão com erro</label></div>
                <div class="report-option"><input type="radio" id="reportWrongAnswer" name="reportType" value="wrong_answer"><label for="reportWrongAnswer">⚠️ Resposta incorreta</label></div>
                <div class="report-option"><input type="radio" id="reportConfusing" name="reportType" value="confusing"><label for="reportConfusing">🤔 Enunciado confuso</label></div>
                <div class="report-option"><input type="radio" id="reportAlternative" name="reportType" value="alternative"><label for="reportAlternative">🔤 Alternativas erradas</label></div>
                <div class="report-option"><input type="radio" id="reportOther" name="reportType" value="other"><label for="reportOther">📝 Outro problema</label></div>
            </div>
        </div>
        <div class="report-section">
            <div class="report-section-title" style="font-weight:700; margin-bottom:8px;">👤 Sua Identificação <span class="required-star">*</span></div>
            <div class="user-info-form">
                <div class="form-group"><label class="form-label">Nome Completo <span class="required-star">*</span></label><input type="text" id="userName" class="form-input" placeholder="Digite seu nome completo" maxlength="100"></div>
                <div class="form-group"><label class="form-label">E-mail <span class="required-star">*</span></label><input type="email" id="userEmail" class="form-input" placeholder="seu.email@exemplo.com" maxlength="100"></div>
                <div class="form-group"><label class="form-label">Instituição/Curso (opcional)</label><input type="text" id="userInfo" class="form-input" placeholder="Ex: SENAI, Engenharia" maxlength="100"></div>
            </div>
        </div>
        <div class="report-section">

  {q: "O que permite que os sistemas Kidde e Fenwal retornem automaticamente ao estado normal após a extinção de um fogo ou superaquecimento?", a: ["A fusão reversível da camada de cerâmica, que recupera a resistência elétrica inicial.", "O realinhamento do campo magnético do relé sensível, que reabre o circuito após o alarme.", "A recuperação da resistência elétrica da cerâmica ou do sal eutético quando a temperatura retorna ao nível normal.", "A desativação manual do relé escravo, que resseta o circuito de alarme para condição de prontidão."], c: 2},
  {q: "Qual é a principal semelhança entre os sistemas de interruptores térmicos e os sistemas contínuos, apesar de diferenças de abrangência?", a: ["Ambos atuam em função de um limite fixo de temperatura, sem sensibilidade direta à taxa de aumento térmico.", "Ambos dependem exclusivamente de termopares para medir variação de tensão entre junções metálicas.", "Ambos disparam o alarme apenas quando há simultâneo aquecimento das junções quente e de referência.", "Ambos funcionam com base na fusão de sais eutéticos embebidos em material cerâmico."], c: 0},
  {q: "Reduzir a temperatura do óleo do motor, a um valor aceitável para a recirculação através do sistema de lubrificação é finalidade do(a):", a: ["filtro", "radiador", "válvula by-pass", "válvula termoestática"], c: 1},
  {q: "O tempo necessário para embandeirar, depende da quantidade de óleo que volta da hélice para o motor, e da força exercida pela mola e pelos contrapesos. Geralmente neste tipo de sistema o tempo normal de embandeiramento, é de:", a: ["três segundos", "dez segundos", "de sete a dez segundos", "três a dez segundos"], c: 3},
  {q: "Rachaduras próximas das bordas das aletas de refrigeração do cilindro implicam em:", a: ["Reparo de acordo com o manual do fabricante", "reparo com furo de parada", "remoção de partes danificadas e retrabalho de suavização dos contornos", "rejeição do cilindro"], c: 2},
  {q: "A distância que uma hélice deveria avançar em uma revolução é:", a: ["a distância realmente percorrida por uma hélice", "a distância que reconhece o recuo da hélice no ar", "chamado de passo teórico ou geométrico", "chamado de passo real ou geométrico"], c: 2},
  {q: "O combustível é sangrado para remover bolhas de ar, impurezas e contaminantes do sistema de combustível. Qual a quantidade aproximada indicada a ser sangrada?", a: ["1/2 Galão", "1 Galão", "2 Galões", "3 Galões"], c: 1},
  {q: "Dependendo do recuo, a hélice terá uma eficiência que varia de:", a: ["50% a 87%", "57% a 87%", "50% a 75%", "55% a 88%"], c: 0},
  {q: "A válvula que determina qual das vias de óleo será tomada em direção ao radiador:", a: ["dreno", "alívio", "by-pass", "controle de fluxo"], c: 3},
  {q: "Um sistema elétrico de controle do gelo da hélice consiste basicamente de uma fonte de energia, um elemento de resistência de aquecimento, controles do sistema e a necessária fiação. Os elementos de aquecimento são montados:", a: ["interna ou externamente no cone e nas pás", "interna ou externamente na pá somente", "interna ou externamente no cone somente", "internamente no cone e nas pás somente"], c: 0},
  {q: "O embandeiramento da hélice é realizado pelo governador, através de:", a: ["comando elétrico", "diminuição do RPM", "alívio da pressão de ar", "alívio da pressão de óleo"], c: 3},
  {q: "Numa turbina de 36 palhetas ao se instalar a primeira palheta na posição de número 10, deve-se instalar a segunda na posição de número:", a: ["18", "19", "28", "36"], c: 2},
  {q: "No procedimentos para pesquisa de problemas no sistema de óleo do motor, a indicação de temperatura de óleo alta ou baixa pode ser problema típico de:", a: ["fornecimento inadequado de óleo, óleo contaminado ou obstrução no tanque de óleo", "Viscosidade de óleo muito baixa, ou nível de óleo no tanque muito baixo", "óleo contaminado ou diluído, ou nível de óleo no tanque muito alto", "viscosidade de óleo incorreta ou óleo contaminado"], c: 0},
  {q: "A hélice percorre uma distância denominada passo efetivo quando:", a: ["comandada para o passo mínimo", "comandada para o passo máximo", "realiza uma volta completa, levando em consideração o recuo", "realiza uma volta completa, sem o recuo"], c: 2},
  {q: "Dano caracterizado pela perda de metal por processo químico ou eletroquímico, os resíduos são geralmente fáceis de serem removidos por processos mecânicos:", a: ["atrito", "delaminação", "corrosão", "abrasão"], c: 2},
  {q: "Qual a principal justificativa para a diluição do óleo com gasolina durante partidas em clima frio?", a: ["Facilitar a atomização do combustível no carburador, reduzindo falhas de ignição inicial.", "Aumentar a pressão do óleo no manômetro, assegurando indicação positiva no painel.", "Promover combustão parcial do óleo acumulado, prevenindo risco de falha hidráulica.", "Diminuir a viscosidade do óleo, permitindo que alcance mais rapidamente as superfícies a lubrificar."], c: 3},
  {q: "Principais vantagens do óleo sintético em relação ao óleo derivado de petróleo:", a: ["menos tendência à formação de borra e a evaporar em altas temperaturas", "tendência a formar bolhas e remover a tinta da superfície que entre em contato com o mesmo", "maior resistência a altas temperaturas sem perder a eficiência", "maior facilidade de dissipar o calor"], c: 0},
  {q: "A finalidade de instalar o tanque de óleo do motor em local acima da bomba é garantir:", a: ["que o óleo circule descontaminado", "a circulação do óleo caso o filtro entupa", "que o óleo não trasborde quando no abastecimento", "o suprimento na linha da bomba por gravidade"], c: 3},
  {q: "Nos tanques de óleo de cárter seco, o tubo interno ou turbilhonador acelerador de temperatura tem como função:", a: ["Manter constante a viscosidade do óleo por meio de troca térmica direta com o ar externo.", "Reduzir a quantidade de óleo a ser diluído, acelerando seu aquecimento durante a partida do motor.", "Evitar a formação de sedimentos e a água na região inferior do coletor de óleo.", "Atuar como um defletor interno para eliminar bolhas e reduzir a espuma do óleo."], c: 1},
  {q: "O ângulo da pá, cujo arrasto da hélice é máximo, denomina-se:", a: ["passo chato ou passo mínimo", "passo chato ou passo máximo", "passo máximo", "passo bandeira"], c: 0},
  {q: "O sistema típico de Lubrificação por cárter seco de motores a jato são do tipo:", a: ["Baixa pressão", "Alta pressão", "Salpico", "Recalque"], c: 1},
  {q: "Por que os detectores Fenwal spot são conectados em paralelo entre dois circuitos completos de fiação?", a: ["Para que o sistema opere proporcionalmente a taxa de aumento da temperatura na zona monitorada.", "Para permitir redundância elétrica, evitando falso alarme em curto de para a massa ou abertura de circuito.", "Para possibilitar a medição de temperatura média do compartimento, reduzindo a necessidade de múltiplos sensores.", "Para acionar simultaneamente relés escravos que garantem o rearme automático após o resfriamento."], c: 1},
  {q: "É a temperatura medida na cabeça do cilindro do motor a pistão e é um parâmetro crítico para monitorar a saúde e operação do motor:", a: ["Termo Couple (TC)", "Electronic Control Unit (ECU)", "Exhaust gas temperature (EGT)", "Cylinder Head Temperature (CHT)"], c: 3},

  {q: "A maioria dos motores turbojato são equipados com um sistema de ignição do tipo:", a: ["eletrônico de alta potência", "eletrônico de baixa potência", "elétrico tipo platinado", "capacitivo de alta energia"], c: 3},
  {q: "A válvula de alívio do sistema de lubrificação tem a finalidade de:", a: ["limitar a pressão de óleo do sistema", "permitir que o óleo não entre no motor", "drenar o óleo em excesso para a linha de abastecimento", "determinar que das vias de óleo seja tomada em direção ao radiador"], c: 0},
  {q: "A tração produzida por uma hélice representa uma porção específica do torque total absorvido, sendo que uma parte considerável é perdida devido a fatores inerentes ao funcionamento do sistema propulsivo. Na média, a tração constitui aproximadamente:", a: ["80% do torque (cavalo-força absorvido pela hélice). Os outros 20% são perdidos na fricção e no recuo", "90% do torque (cavalo-força absorvido pela hélice). Os outros 10% são perdidos na fricção e no recuo", "85% do torque (energia aproveitada pela hélice). O percentual restante de 15% é perdido devido ao atrito e ao movimento de recuo da hélice", "75% do torque (energia aproveitada pela hélice). O percentual restante de 25% é perdido devido ao atrito e ao movimento de recuo da hélice"], c: 0},
  {q: "A unidade de Controle de Combustível para o motor a jato é o (a):", a: ["Turbina", "Compressor", "Carburador", "FCU"], c: 3},
  {q: "Uma das finalidades das engrenagens de redução da caixa de acessórios do motor é:", a: ["reduzir a velocidade do eixo de ressaltos", "limitar a velocidade de rotação da hélice", "aumentar a velocidade de rotação do motor", "aumentar a velocidade de rotação do eixo de manivelas"], c: 1},

  {q: "A revisão maior consiste na desmontagem completa e no recondicionamento de todo o grupo motopropulsor do motor. Esse tipo de revisão é essencial para garantir o bom funcionamento e a segurança da aeronave. O período para realizar essa revisão completa é determinado pelo (a):", a: ["fabricante do motor somente", "autoridade aeronáutica do país somente", "fabricante do motor ou por um máximo de horas de operação entre as revisões, conforme aprovado pela FAA", "fabricante do motor ou por um máximo de horas de operação entre as revisões, conforme aprovado pela ANAC"], c: 3},

  {q: "O que é um \"hung start\" em um motor a turbina:", a: ["refere-se à situação em que o motor consegue atingir a velocidade necessária para a marcha lenta antes do esperado", "ocorre quando o motor consegue manter a rotação necessária durante a fase inicial do processo de partida sem consumir muito combustível", "ocorre quando há uma falha na ignição do motor durante a partida e resulta em rotação excessiva", "ocorre quando o motor é acionado, mas não acelera até a rotação de marcha lenta"], c: 3},

  {q: "O instrumento que recebe o sinal elétrico de um transmissor instalado na tubulação de combustível, e que tem finalidade de indicar o consumo horário do motor, denomina-se:", a: ["hodômetro", "vacuômetro", "fluxômetro", "liquidômetro"], c: 2},
  {q: "O controle de temperatura do óleo, pela variação do fluxo de óleo que passa pelo radiador, é realizado através de um(a):", a: ["ventoinha", "válvula termostática", "arruela de pressão", "bomba"], c: 1},
  {q: "A eficiência da hélice varia de 50% a 87%, depende:", a: ["Da torção em direção ao centro do cubo", "Do quanto ela recua", "Do quanto ela avança", "Do embandeiramento na condição de stop well"], c: 1},
  {q: "O sistema de proteção contra fogo de uma aeronave turbojato detecta e combate incêndios nos motores. Para permitir um acionamento rápido em emergências, os pilotos controlam o sistema da cabine através:", a: ["de punho manual e um interruptor elétrico", "de uma alavanca de emergência", "botão de acionamento", "de uma alavanca de descarga automática"], c: 0},
  {q: "O sistema de detecção de fogo que consiste de pontos de junção de metais diferentes é chamado de:", a: ["spot", "termopar", "circuito contínuo", "interruptor térmico"], c: 1},
  {q: "Tirando-se as perdas, devido o recuo da hélice a mesma apresenta eficiência em torno de:", a: ["20% a 40%", "50% a 87%", "98%", "100%"], c: 1},
  {q: "No sistema de lubrificação, a válvula by-pass instalada paralelamente ao filtro abrir-se-á, no caso:", a: ["de ocorrer pane na bomba principal", "do óleo superaquecer", "do filtro entupir", "de faltar óleo na linha de pressão"], c: 2},
  {q: "A finalidade de se aplicar o passo reverso durante o pouso é:", a: ["reduzir a corrida na pista, durante o pouso", "proporcionar maior controle do avião no solo", "reduzir o tempo gasto para o táxi", "economizar combustível"], c: 0},
  {q: "No óleo do tipo SAE 40W, a indicação que o mesmo é satisfatório para clima frio é:", a: ["W", "40", "40W", "SAE"], c: 0},

  {q: "A temperatura dos gases de exaustão é indicada pelo seguinte instrumento:", a: ["N1", "N2", "EGT", "Manômetro de temperatura"], c: 2},
  {q: "Uma hélice reversível é uma hélice:", a: ["em que o ângulo da pá pode ser mudado para um valor negativo, durante a operação", "em que o ângulo da pá diminui o suficiente para evitar que o motor reduza sua rotação", "que é usada como freio aerodinâmico e que aumenta a corrida da aeronave após o pouso", "que, na condição de falha do motor, muda o passo para que reduza ao mínimo a resistência ao avanço"], c: 0},
  {q: "Pela regulagem do fluxo de ar que passa pelo radiador, a temperatura do óleo pode ser controlada para adequar as diversas condições de operação. Um dos dispositivos mais utilizados para controle automático da temperatura do óleo é:", a: ["termistor elétrico", "relé de temperatura", "regulador de fluxo", "termostato flutuante"], c: 3},
  {q: "No sistema de detecção de fogo do motor tipo contínuo Fenwal, qual elemento químico da construção é responsável pela queda brusca da resistência elétrica em condição de alarme?", a: ["A liga metálica de Inconel, que conduz calor e aumenta a corrente no fio sensor.", "O cromel, presente na junção quente que gera diferença de potencial termoelétrico.", "O sal eutético, embebido na cerâmica, que reduz rapidamente a resistência ao atingir temperatura crítica.", "O constantan, utilizado no núcleo do fio sensor, que perde estabilidade elétrica com o calor."], c: 2},
  {q: "Ao remover as válvulas da cabeça do cilindro devemos examinar a espessura das bordas das cabeças das válvulas utilizando:", a: ["microscópio eletrônico", "líquido penetrante", "relógio comparador e uma placa plana", "lente de aumento"], c: 2},
  {q: "No motor turboélice a força é controlada diretamente pela:", a: ["velocidade do motor (RPM)", "temperatura dos gases de entrada da turbina", "temperatura dos gases na entrada do compressor", "pressão do ar na admissão"], c: 1},
  {q: "No sistema de controle da hélice, em que faixa de operação do motor turboélice os \"limites Beta\" são ativados?", a: ["são ativados abaixo da posição de marcha lenta de voo (flight idle) da manete de potência, na faixa de operação geralmente associada às operações no solo", "são ativados acima da posição de potência máxima contínua, para garantir que a hélice opere dentro dos limites seguros durante o voo em alta potência", "são ativados quando a manete de potência é ajustada para a faixa de cruzeiro, para otimizar o desempenho da hélice em voos de longa distância e no solo", "são ativados durante a fase de subida, para garantir que a hélice mantenha o ângulo adequado enquanto o motor opera em alta rotação"], c: 0},
  {q: "Qual parâmetro mede a menor temperatura em que um óleo mantém fluidez suficiente para escoar ou ser derramado?", a: ["Ponto de fulgor, representando a formação de vapores combustíveis capazes de sustentar ignição contínua.", "Ponto de fluidez, representando a temperatura mínima em que o óleo ainda pode fluir adequadamente.", "O ponto de fluidez determina a temperatura limite superior em que o óleo conserva sua capacidade de lubrificar e lubrificar adequadamente.", "O ponto de fulgor determina a temperatura na qual o lubrificante libera vapores que, ao entrar em contato com fonte de ignição, estabelecem chama contínua."], c: 1},
  {q: "O fogo na parte interna do escapamento dos motores a reação, durante o corte ou falsa partida, pode ser eliminado por:", a: ["agente extintor pode ser dirigido ao interior do tubo de escapamento ou bocal de entrada", "acionamento da manete de descarga do agente extintor", "corte imediato da alimentação do motor", "giro do motor com o motor de partida"], c: 3},
  {q: "A finalidade do passo reversível na hélice é:", a: ["aumentar a corrida na decolagem", "aumentar o volume de ar para o compressor", "diminuir a corrida das aviões durante a aterragem", "diminuir a velocidade da massa de ar no compressor"], c: 2},
  {q: "Um óleo fluido lentamente está com a característica de:", a: ["alta viscosidade", "baixa viscosidade", "alta volatilidade", "baixa volatilidade"], c: 0},
  {q: "Their purpose is always to maintain proper oil temperature by varying the proportion of the total oil flow passing through the oil cooler. Consists of a valve body, having two inlet ports and one outlet port, and a spring-loaded element valve. A qual elemento se refere o texto anterior?", a: ["Thermostatic valve", "Anti by-pass valve", "Curvo Valve", "Unidirectional valve"], c: 0},
  {q: "Dentre as alternativas abaixo, aquela que identifica os métodos de distribuição do óleo para a lubrificação das diversas peças móveis do motor, é a(s):", a: ["decantação e sucção", "pressão e compressão", "salpique e pressão", "pulverização e compressão"], c: 2},
  {q: "No sistema de lubrificação do motor, a válvula de corta da parede de fogo deverá estar na posição aberta sempre que:", a: ["ocorrer fogo no motor", "o motor estiver funcionando normalmente", "for necessário drenar o óleo para manutenção", "a tubulação, na linha de fornecimento, se romper e o óleo vazar"], c: 1},
  {q: "Se durante a inspeção da câmara de combustão de um motor a turbina, o mecânico observa que duas rachaduras estão progredindo a partir de uma borda livre de tal modo que seu encontro é iminente, e pode levar uma peça de metal a se soltar. Neste contexto a câmara de combustão deve ser:", a: ["substituída", "reparada imediatamente", "inspecionada para verificar se há propagação do dano", "reparada com solda ou furo de parada"], c: 0},
  {q: "Qual foi a principal razão para o banimento internacional da produção de halons a partir de 1986?", a: ["Elevado risco de incêndio espontâneo em contato com superfícies metálicas aquecidas.", "Impacto significativo na camada de ozônio, resultando em restrição global de fabricação.", "Classificação de toxicidade UL incompatível com áreas ocupadas em aeronaves.", "Alta corrosividade em ligas leves, inviabilizando sua aplicação em sistemas aeronáuticos."], c: 1},
  {q: "Rachaduras na base das aletas do cilindro implicam em:", a: ["reparo de acordo com o manual do fabricante", "reparo com furo de parada", "remoção de partes danificadas e retrabalho de suavização dos contornos", "rejeição do cilindro"], c: 3},
  {q: "Flocos de metal que se desprendem da superfície metalizada ou pintada, usualmente causado por falha da metalização, galvanização ou ainda por excesso de carga é a definição de:", a: ["Delaminação", "Serrilhamento", "Raspado", "Descoloração"], c: 0},
  {q: "Instrumento que permite monitorar o consumo de combustível e verificar o desempenho do motor:", a: ["Fluxômetro", "EGT", "Fuel pressure", "Variômetro"], c: 0},
  {q: "Durante a operação de um motor a reação no solo, se ocorrer um fogo no motor durante o ciclo de partida deve-se:", a: ["mover a alavanca de corte de combustível para a posição IDLE imediatamente e permitir o giro do motor com o arranque até que o fogo seja expelido do motor", "mover a alavanca de corte de combustível para a posição OFF imediatamente e permitir o giro do motor com o arranque até que o fogo seja expelido do motor", "descarregar CO2 no duto de entrada enquanto o motor está sendo girado. Isso ajuda a extinguir o fogo dentro do motor", "descarregar CO2 diretamente na saída do motor"], c: 1},
  {q: "Em uma aeronave quadrimotor, qual é a sequência correta de operação do punho de fogo e interruptor de transferência em caso de fogo persistente no motor número 4?", a: ["Puxar o punho de fogo nº 4, acionar o interruptor de descarga, e depois mover o interruptor de transferência para \"TRANS\" para liberar a segunda garrafa.", "Colocar o interruptor de transferência em \"TRANS\", puxar o punho de fogo nº 4 e acionar o interruptor de descarga.", "Acionar diretamente o interruptor de descarga nº 4 sem necessidade de puxar o punho de fogo.", "Puxar o punho de fogo nº 4 e, sem necessidade de transferência, ambas as garrafas descarregam automaticamente no mesmo motor."], c: 0},
  {q: "Nos motores com injeção de combustível, a tubulação de admissão transporta:", a: ["apenas combustível pulverizado", "ar e combustível", "apenas combustível", "apenas ar"], c: 3},
