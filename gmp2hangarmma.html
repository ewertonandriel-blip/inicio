  {q: "Após uma parada brusca do motor, ocasionada pelo impacto de uma pá da hélice com o solo, é provável que ocorra desalinhamento no(a):", a: ["magneto", "filtro de óleo", "eixo de manivelas", "tubo de escapamento"], c: 2},
  {q: "Porque ocorre a partida falsa em motores a jato?", a: ["força insuficiente para o motor de partida", "mistura ar combustível pobre", "mistura ar combustível rica", "bateria fraca ou descarregada"], c: 0},
  {q: "O sistema de degelo da hélice emprega?", a: ["Óleo quente do motor", "Ar quente da seção de escapamento", "Resistência elétrica", "Ar quente de um dos estágios do compressor"], c: 2},
  {q: "O sistema de aviso de fogo, por par térmico consiste de uma caixa de relés, luzes de aviso e pares térmicos. Como os pares térmicos estão ligados ao circuito e ao relé sensível respectivamente?", a: ["série e série com relé sensível", "em série e série-paralelo com relé sensível", "paralelo em série com relé sensível", "paralelo e paralelo com relé sensível"], c: 0},
  {q: "Dentre os tipos de óleo abaixo aquele que tem menor viscosidade é o:", a: ["SAE 20", "SAE 40", "SAE 50", "SAE 60"], c: 0},
  {q: "Os casquilhos das bielas mestras junto aos eixos de manivelas são lubrificados por:", a: ["pressão", "salpique", "projeção", "aspersão"], c: 0},
  {q: "De acordo com o passo da hélice, se for:", a: ["Pequeno, temos pequeno avanço, baixa velocidade e menos potência", "Pequeno, temos pequeno avanço, baixa velocidade e maior potência", "Grande, temos grande avanço, baixa velocidade e potência invariável", "Grande, temos grande avanço, grande velocidade e maior potência"], c: 2},
  {q: "Qual é o princípio do funcionamento do detector spot utilizado no sistema Fenwal?", a: ["Ele utiliza um termopar de cromel e constante para gerar voltagem proporcional à diferença de temperatura.", "Ele utiliza um interruptor térmico bimetálico que fecha o circuito ao atingir determinada temperatura.", "Ele depende de um amplificador magnético que aciona a lâmpada de aviso ao detectar queda de resistência.", "Ele mede continuamente a resistência total do sensor para indicar aumento gradual de temperatura."], c: 1},
  {q: "Dano caracterizado pelo deslocamento de material, além do contorno normal ou na superfície. Geralmente não apresenta perda de metal:", a: ["Recalcamento", "Moça", "Entalhe", "Salpique"], c: 0},
  {q: "Quais falhas mecânicas em motores a turbina podem levar a uma condição de superaquecimento ou até incêndio durante a operação?", a: ["Falhas mecânicas graves, como a quebra de pá de turbina ou o desprendimento de pá, que comprometem o fluxo de gases quentes e podem provocar superaquecimento e fogo", "Acúmulo excessivo de fluido hidráulico nas câmaras de combustão, que reduz a eficiência térmica e gera ignição precoce", "Mau funcionamento dos defletores de óleo no sistema de admissão, causando recirculação de ar frio e superaquecimento local", "Desbalanceamento do eixo de baixa pressão, que impede a compressão adequada do ar e resulta em combustão incompleta com risco de fogo"], c: 0},
  {q: "The imovable plug inside the cylinder of a reciprocating engine. It moves in and out to compress the fuel-air mixture and to transmit the force from the expanding gas in the cylinder to the crankshaft. O texto anterior se refere a:", a: ["crankshaft", "pin", "cylinder", "piston"], c: 3},
  {q: "Qual das características diferencia o sistema Fenwal spot em relação aos sistemas contínuos Kidde e Fenwal?", a: ["O sistema spot não requer unidade de controle, pois o alarme é disparado diretamente pelo fechamento do interruptor térmico.", "O sistema spot mede a temperatura média do compartimento e fornece resposta proporcional ao aquecimento.", "O sistema spot opera com sensores de cerâmica embebidos em sal eutético, reduzindo resistência elétrica.", "O sistema spot é capaz de se rearme automaticamente após um disparo, sem intervenção da tripulação."], c: 0},
  {q: "No sistema de aviso de fogo do tipo par térmico, por que não ocorre alarme durante um superaquecimento gradual da nacele do motor?", a: ["Porque o aumento simultâneo de temperatura aquece igualmente a junção quente e a junção de referência.", "Porque o relé sensível só atua quando o circuito de teste está energizado durante a operação normal.", "Porque a resistência total do circuito excede o limite de 5 ohms estabelecido pelo fabricante.", "Porque o relé escravo mantém a bobina desenergizada até o disparo manual pelo piloto no cockpit."], c: 0},
  {q: "O núcleo do radiador de óleo é construído com tubos de cobre ou alumínio, num formato que aparenta um (a):", a: ["tela", "disco", "colmeia", "pinheiro"], c: 2},
  {q: "Quando ambas as válvulas de admissão e escape estão fechadas?", a: ["no início do movimento de potência", "no início do movimento de exaustão", "no ponto morto alto", "no ponto morto baixo"], c: 0},
  {q: "A força física que tende a expulsar as pás do cubo quando a hélice está em movimento denomina-se:", a: ["recuo", "tração", "centrífuga", "aerodinâmica"], c: 2},
  {q: "São razões mais comuns para remoção e substituição de um motor alternativo:", a: ["Parada brusca, extensão excedida da vida do motor, súbita redução na velocidade de rotação e presença de partículas metálicas no óleo", "Vibrações anormais, aumento da pressão de óleo, superaquecimento frequente e desgaste excessivo dos rolamentos", "Dificuldade em dar partida, baixa pressão de óleo, súbita redução na velocidade de rotação e presença de partículas metálicas no óleo", "Ruído excessivo durante a operação, aumento constante no consumo de combustível, falhas frequentes de ignição e presença de fumaça preta no escape"], c: 0},
  {q: "No sistema de lubrificação por pressão em motores a explosão, qual é a função da linha de sucção conectada ao tanque em ponto mais alto que o coletor de óleo?", a: ["Facilitar a drenagem de óleo excedente durante a partida do motor em tempo frio.", "Evitar que sedimentos depositados no coletor sejam aspirados pela bomba.", "Permitir que o óleo seja recirculado para resfriamento antes de entrar na bomba.", "Reduzir a pressão de sucção na bomba, estabilizando o fluxo em baixas rotações."], c: 1},
  {q: "Qual é o papel da unidade de controle nos sistemas de detecção contínua aplicados aos motores das aeronaves?", a: ["No Kidde, medir constantemente a resistência total do sensor; no Fenwal, acionar o alarme por meio de amplificador magnético.", "No Kidde, amplificar o sinal térmico recebido; no Fenwal, calcular a média de temperatura de todo o compartimento.", "No Kidde, detectar apenas a taxa de aumento de temperatura; no Fenwal, comparar resistência de múltiplos sensores em série.", "No Kidde, atuar exclusivamente em zonas específicas de chama; no Fenwal, energizar os detectores por corrente alternada."], c: 0},
  {q: "Após drenar o composto anticorrosivo de dentro do motor, é necessário verificar se há acúmulo desse composto em que partes?", a: ["interna dos cilindros mais baixos e nos respectivos dutos de admissão e utilizar uma bomba manual para remover o composto remanescente", "interna dos cilindros superiores e nos respectivos dutos de admissão", "externa dos cilindros mais baixos e nos respectivos dutos de admissão", "interna dos cilindros mais baixos e nos respectivos dutos de admissão e utilizar um aspirador pneumático para remover o composto remanescente"], c: 0},
  {q: "Qual a principal diferença de um motor a reação e convencional?", a: ["O motor convencional é um tipo de motor que utiliza a aceleração do ar para gerar propulsão enquanto nos motores convencionais ou a pistão as fases ocorrem intermitentemente.", "O motor a reação ou a jato é um tipo de motor que utiliza a aceleração do ar para gerar propulsão enquanto nos motores convencionais ou a pistão as fases ocorrem intermitentemente.", "Em um motor convencional, as fases ocorrem de maneira contínua no interior de um cilindro, enquanto nos motores a reação as fases ocorrem intermitentemente.", "Em um motor convencional, as fases ocorrem intermitentemente no interior de um cilindro, enquanto nos motores a reação as fases ocorrem de maneira contínua."], c: 3},
  {q: "O tipo de agente que extingue a chama pela dissipação imediata do oxigênio da área é o:", a: ["clorobromometano", "brometo de metila", "dióxido de carbono", "tetracloreto de carbono"], c: 2},
  {q: "A instalação do tubo do bocal de abastecimento, no tanque de óleo, é posicionado de forma a prover o(a):", a: ["suspiro do tanque", "ventilação do tanque", "espaço suficiente à expansão do óleo", "pressurização do sistema de lubrificação"], c: 2},
  {q: "No motor convencional, a centelha ocorre quando o pistão passa através do ponto morto:", a: ["alto, no tempo de compressão", "alto, no tempo de escapamento", "baixo, no tempo motor", "baixo, no tempo de admissão"], c: 0},
  {q: "No sistema de refrigeração do motor, a finalidade do termostato flutuante do controle de fluxo de ar através do radiador é:", a: ["manter automaticamente a temperatura normal do óleo", "assegurar a quantidade máxima de óleo, necessária ao funcionamento do sistema", "controlar automaticamente a pressão do óleo", "assegurar a quantidade mínima de óleo, necessária ao funcionamento do motor"], c: 0},
  {q: "Qual procedimento pode eliminar um fogo interno no escapamento de um motor a turbina durante uma falsa partida?", a: ["Desligar imediatamente o motor e aplicar CO2 diretamente na seção de turbina.", "Acionar o motor de partida para girar o motor e expelir o combustível em combustão.", "Romper manualmente os discos indicadores das garrafas de CO2 para descarga imediata.", "Reduzir o fluxo de combustível até a chama apagar-se por falta de oxigênio."], c: 1},
  {q: "Nos motores radiais, a parte interna dos cilindros mais baixos, e respectivos dutos de admissão, devem ser cuidadosamente verificados quanto à presença excessiva de composto anticorrosivo, que foi drenado de dentro do motor, mas tende a acumular-se nas partes mais baixas. Se por alguma razão, o excesso de composto anticorrosivo for encontrado acumulado nos cilindros superiores, a prática padrão será:", a: ["Injetar ar comprimido nos cilindros superiores para forçar a remoção do composto anticorrosivo acumulado", "Substituir o composto anticorrosivo por fluido de lavagem e girar manualmente o motor para eliminar o excesso", "Remover o excesso de composto anticorrosivo por bomba elétrica", "Remover o excesso de composto anticorrosivo por bomba manual"], c: 3},
  {q: "A inspeção das partes do motor durante uma revisão completa é dividida em três categorias, quais são?", a: ["Visual, magnética, dimensional", "Abstrata, magnética, dimensional", "Superficial, magnética, dimensional", "Visual, magnética, diagonal"], c: 0},
  {q: "Por que, em aeronaves multimotores, cada motor utiliza um sistema de lubrificação independente no arranjo de cárter seco?", a: ["Para possibilitar que motores diferentes operem com graus distintos de viscosidade de óleo em condições extremas.", "Para assegurar redundância operacional, evitando que a falha de um sistema comprometa todos os motores.", "Para reduzir a formação de espuma do óleo, que seria maior em sistemas interligados entre motores.", "Para diminuir a necessidade de resfriamento, já que cada radiador trabalha apenas para um motor específico."], c: 1},
  {q: "O limite não governado, ou de taxi, que compreende da posição do 'reverso' até a 'marcha lenta de voo', é denominado de:", a: ["Passo bandeira", "Controle da Lenta", "Limite beta", "Posição IDLE"], c: 2},
  {q: "Na parte externa dos cilindros dos motores resfriados a ar encontram-se as:", a: ["Bielas", "Camisas dos cilindros", "Alhetas de resfriamento", "Saias dos cilindros"], c: 2},
  {q: "Qual característica distingue o princípio de operação entre o sistema contínuo Kidde e o sistema Fenwal?", a: ["O sistema Kidde monitora pontos específicos; o Fenwal cobre toda a área sensoreada de forma proporcional.", "O sistema Kidde depende da fusão do sal eutético; o Fenwal opera pela variação gradual da resistência do cerâmica.", "O sistema Kidde utiliza um amplificador magnético para controle; o Fenwal mede a resistência total do sensor continuamente.", "O sistema Kidde responde proporcionalmente à temperatura média e a pontos isolados; o Fenwal dispara alarme imediato em qualquer ponto crítico."], c: 3},
  {q: "Durante uma revisão completa de motor aeronáutico, qual a sequência correta dos três métodos de inspeção das partes do motor que devem ser aplicadas para garantir a detecção abrangente de falhas estruturais e dimensionais?", a: ["Inspeção magnética, inspeção dimensional e inspeção visual para finalizar a análise das peças com precisão adequada.", "Inspeção visual precedendo qualquer outro método, seguida de inspeção magnética e inspeção dimensional para completar a avaliação.", "Inspeção dimensional inicial, inspeção visual intermediária e inspeção magnética final para determinar todas as falhas presentes.", "Inspeção magnética precedendo os outros métodos, inspeção visual secundária e inspeção dimensional para fechar o processo."], c: 1},
  {q: "Quando súbita redução de velocidade de rotação de um motor alternativo ocorrer o que deve ser feito?", a: ["Fazer um teste com motor em voo", "Inspecionar interna e externamente", "Remover o motor e inspecionar", "Verificar se o eixo de manivelas sofreu empenamento"], c: 3},
  {q: "Perda de metal, usualmente por uma apreciável profundidade ao longo de uma área, por meios mecânicos pelo uso de lâminas de serra, cinzel, tesouras, guilhotina ou até por cantos vivos, agudos, etc.:", a: ["Corte", "Erosão", "Arranhado", "Raspado"], c: 0},
  {q: "Os sistemas de ignição de motores a turbinas são, via de regra, são menos passíveis de problemas em relação aos sistemas de ignição em motores convencionais por:", a: ["serem operados por um curto período durante o ciclo de partida do motor", "ter menor exposição a condições Adversas como temperatura e pressão", "ter uma combustão mais estável e contínua", "possuir um sistema duplo de sincronização independente"], c: 0},
  {q: "A bomba de sucção do alojamento da caixa de acessórios é acionada por uma?", a: ["Alavanca de atuadores", "Turbina pneumática", "Engrenagem", "Caixa elétrica"], c: 2},
  {q: "Num óleo do tipo SAE 20W a especificação de uso em clima frio é determinado pelo:", a: ["E", "W", "20", "SAE"], c: 1},
  {q: "O alarme sonoro e a luz de aviso de fogo serão energizados imediatamente quando:", a: ["for acionado o punho de fogo", "for acionado o interruptor da válvula de corte do motor", "a resistência do sensor for acima de um valor determinado", "a resistência do sensor for inferior a um valor determinado"], c: 3},
  {q: "A desestocagem adequada de motores radiais inclui uma verificação cuidadosa e:", a: ["drenagem do composto anticorrosivo dos cilindros mais baixos para evitar o calço hidráulico", "drenagem do composto anticorrosivo dos cilindros mais altos para evitar calço vapor", "instalar os indicadores de umidade dos orifícios das velas de cada cilindro, especialmente focando nos cilindros inferiores onde o composto tende a se acumular", "remover os indicadores de umidade dos orifícios das velas de cada cilindro, especialmente focando nos cilindros superiores onde o composto tende a se acumular"], c: 0},
  {q: "Os vários sistemas de alarme operam luzes de aviso no painel de fogo na cabine, energizando também um alarme?", a: ["Sonoro na cabine de passageiros", "Sonoro na cabine", "Sonoro localizado no extintor dos comissários", "Sonoro na torre de comando"], c: 1},
  {q: "A classificação SAE (Society of Automotive Engineers) dos óleos lubrificantes divide-os em grupos numéricos (SAE 10 a 70). O que essa numeração representa?", a: ["A qualidade global do óleo, incluindo aditivos detergentes, dispersantes e anticorrosivos aplicados na formulação.", "A viscosidade relativa do óleo medida a 130 ºF ou 210 ºF, sem relação direta com o índice Saybolt.", "O peso específico do óleo comparado com a água destilada em uma faixa de temperatura controlada.", "A estabilidade térmica e a resistência do óleo em altas rotações, sob condições de combustão interna."], c: 1},
  {q: "A válvula de corte do sistema de lubrificação, instalada na parede de fogo da nacele possui como função primária:", a: ["Eliminar excesso de pressão no sistema, prevenindo vazamentos na tubulação de óleo.", "Interromper o suprimento de óleo em caso de incêndio, ruptura de linha ou manutenção.", "Atuar como válvula de alívio para liberar o excesso de óleo em caso de aumento anormal da viscosidade.", "Redirecionar o fluxo de óleo para o tubo interno do tanque durante regimes de baixa potência."], c: 1},
  {q: "No circuito de detecção por pares térmicos, qual condição provoca o fechamento do relé sensível?", a: ["A atuação simultânea do relé escravo, que alimenta a bobina de indução principal do sistema.", "O disparo automático do relé teste térmico, projetado para simular um aumento de temperatura.", "O aquecimento gradual do motor em operação normal, aumentando a corrente de forma contínua no circuito.", "A corrente gerada ultrapassar quatro miliampéres, devido ao rápido aquecimento da junção quente."], c: 3},
  {q: "A finalidade do passo reverso é a de produzir uma tração:", a: ["Negativa", "Estol", "Neutra", "Positiva"], c: 0},
  {q: "Nos sistemas de detecção de fogo de motor a reação, qual critério deve ser observado na fixação dos sensores contínuos para evitar falhas por vibração?", a: ["Distância entre braçadeiras de fixação deve ser de 8 a 10 polegadas em trechos retos.", "Fixação rígida a cada 2 polegadas, impedindo qualquer movimento.", "Braçadeiras espaçadas a cada 15 polegadas, garantindo flexibilidade térmica.", "Primeira braçadeira deve estar sempre a 10 polegadas de cada conexão de junção."], c: 0},
  {q: "Na desestocagem de motores radiais, é fundamental realizar uma verificação minuciosa na parte interna dos cilindros mais baixos e nos respectivos dutos de admissão. Isso se deve ao fato de que, após o motor ser armazenado, isso se deve por que:", a: ["pode haver a presença excessiva de composto anticorrosivo que foi drenado do motor, mas que tende a se acumular nas partes mais baixas do pistão", "pode haver a presença excessiva de óleo residual que foi drenado do motor, mas que tende a se acumular nas partes mais altas dos pistões", "pode haver a presença excessiva de óleo residual que foi drenado do motor, mas que tende a se acumular nas partes mais baixas dos cilindros", "pode haver a presença excessiva de composto anticorrosivo que foi drenado do motor, mas que tende a se acumular nas partes mais baixas dos cilindros"], c: 3},
  {q: "No instrumento, o limite perigoso de operação é indicado pela faixa de cor?", a: ["Vermelha", "Verde", "Azul", "Amarela"], c: 0},
  {q: "Sobre os tipos de sistemas de lubrificação dos motores aeronáuticos podemos afirmar que:", a: ["cárter molhado ou cárter seco", "cárter molhado somente", "cárter seco somente", "úmido"], c: 0},
  {q: "Na limpeza das peças da seção quente do motor, podem ser utilizados agentes do tipo:", a: ["álcool ou querosene", "emulsão ou querosene", "álcool etílico ou gasolina", "emulsão ou solvente clorado"], c: 3},
  {q: "Se uma hélice gira a 2.400 RPM e as engrenagens de redução trabalham em uma razão de 12:1, a rotação com que o eixo de manivelas gira é de:", a: ["200 RPM", "2400 RPM", "4800 RPM", "28800 RPM"], c: 3},
  {q: "Uma parada de motor em decorrência de colisão de uma ou mais pás de hélice com um objeto, de modo que o motor pare antes que a hélice complete uma volta, denomina-se:", a: ["retorno de chama", "calço hidráulico", "parada brusca", "corte de motor"], c: 2},
  {q: "O sistema de controle do torque negativo (NTS) proporciona um sinal que:", a: ["aumenta a rotação do motor para compensar o torque negativo gerado pelo eixo, estabilizando o desempenho da hélice", "diminui a rotação do motor para compensar o torque negativo gerado pelo eixo, estabilizando o desempenho da hélice", "aumenta o ângulo da pá da hélice para limitar o torque negativo do eixo", "diminui o ângulo da pá da hélice para limitar o torque negativo do eixo"], c: 2},
  {q: "A finalidade da bomba de sucção no sistema de lubrificação do motor é:", a: ["retornar o óleo ao tanque", "conduzir o óleo para o radiador", "circular o óleo através do motor", "suprir óleo para a bomba principal"], c: 0},
  {q: "A hélice que ajusta o passo, sem atuação do operador, para manter constante a RPM do motor, denomina-se:", a: ["ajustável", "automática", "de passo constante", "de passo controlável"], c: 1},
  {q: "A potência de um motor diminui à medida que a aeronave se eleva na atmosfera porque:", a: ["há um acréscimo contínuo da temperatura do ar com a altitude", "há um acréscimo contínuo da densidade do ar com a altitude", "há um decréscimo contínuo da densidade do ar com a altitude", "há um decréscimo contínuo da temperatura do ar com a altitude"], c: 2},
  {q: "Por que os sistemas de cárter cheio não são adequados para voo invertido (voo de dorso)?", a: ["Porque a pressão de óleo cai a zero, levando ao travamento imediato dos mancais principais.", "Porque todo o suprimento de óleo migra para os cilindros superiores, provocando combustão irregular.", "Porque o óleo se desloca no coletor e inunda o motor, interrompendo a lubrificação normal.", "Porque a válvula de corte da parede de fogo é forçada a fechar por pressão diferencial."], c: 2},
  {q: "No sistema contínuo Kidde, como a alteração da temperatura provoca o disparo do alarme?", a: ["Pela fusão do sal eutético, que reduz bruscamente a resistência elétrica da camada cerâmica isolante.", "Pela redução gradual da resistência elétrica da cerâmica envolvente, permitindo fluxo de corrente entre condutor e massa.", "Através do aumento progressivo da resistência elétrica do material cerâmico circundante, dificultando a possibilitando a passagem de corrente entre o condutor e a terra.", "Pelo aumento da capacitância entre os fios enrolados em Inconel, que gera diferença de potencial instantânea."], c: 1},
  {q: "Quanto ao uso do transferidor universal da hélice, ele pode ser usado para checar os ângulos da pá quando a hélice estiver:", a: ["em posição vertical somente", "instalada no motor somente", "na bancada somente", "na bancada de balanceamento ou instalada no motor de uma aeronave"], c: 3},
  {q: "Na limpeza dos motores alternativos as escovas de aço:", a: ["nunca devem ser usadas por ter o risco de corrosão com alumínio", "podem ser usadas sem restrição", "devem ser usadas em buchas ou superfícies de contato com cautela", "nunca devem ser usadas em buchas ou superfícies de contato"], c: 3},
  {q: "O eixo da hélice pode ser conectado por meio de engrenagens redutoras ao eixo?", a: ["De bielas", "Do comando de válvulas", "Cardan", "De manivelas"], c: 3},
  {q: "No sistema de indicação de temperatura do cilindro, para manter o instrumento em bom estado de funcionamento e garantir leituras precisas da temperatura do cilindro durante a operação do motor deve-se:", a: ["Certificar-se de que o sensor de temperatura esteja instalado no cilindro mais frio do motor", "Verificar o visor do instrumento indicador de temperatura para garantir que não esteja solto, trincado ou com perda de indicação nos ressaltos", "Verificar a conexão elétrica e aterramento entre o sensor de temperatura e o instrumento para garantir um bom contato e evitar interferências", "Realizar testes de calibração periódicos no instrumento indicador de temperatura"], c: 1},
  {q: "O dispositivo que controla o ângulo das pás de uma hélice de passo variável é o?", a: ["By pass fuel", "Gerador", "Bomba", "Governador"], c: 3},
  {q: "Qual é o principal objetivo do sistema de controle do torque negativo (NTS)?", a: ["Aumentar a eficiência do motor", "Aumentar a estabilidade da aeronave durante o voo", "Minimizar o desgaste da hélice", "Limitar o torque negativo gerado pelo fluxo de ar nas mariposas da aeronave"], c: 3},
  {q: "Nos sistemas de detecção de fogo de motores, qual configuração é considerada ideal para garantir precisão e confiabilidade operacional?", a: ["Um sistema único de detectores em paralelo, cobrindo todos os motores simultaneamente para reduzir peso e fiação.", "Um conjunto de detectores que forneça localização da área afetada, com indicação luminosa e alarme sonoro no cockpit.", "Um sistema capaz de operar exclusivamente por inversores, garantindo isolamento contra falhas do gerador principal.", "Uma rede de sensores que funcione apenas em condições de voo, evitando consumo elétrico em solo."], c: 1},
  {q: "Dano numa superfície acabada de uma peça, devido a vibração e fricção, causado pelo pequeno movimento relativo de duas superfícies de peças sob contato de alta pressão, caracterizando um desgaste severo:", a: ["Serrilhamento", "Ranhuramento", "Sulqueamento", "Erosão"], c: 2},
  {q: "Ao encontrar rachaduras na base das aletas de refrigeração do motor deve-se:", a: ["rejeitar o cilindro", "aplicar solda", "inspeção por líquidos penetrantes (zyglo)", "remover a parte danificada com retrabalho dos contornos"], c: 0},
  {q: "Se uma determinada palheta de um disco de turbina requerer substituição, deverá também ser substituída a que estiver:", a: ["a 90 graus à direita", "diametralmente oposta", "ao seu lado, do lado direito", "ao seu lado, do lado esquerdo"], c: 1},
  {q: "No sistema de lubrificação do motor, a válvula de alívio localizada na saída da bomba principal limita a pressão máxima do sistema, desviando o óleo para o reservatório ou para o(a):", a: ["dreno", "entrada da bomba principal", "saída do radiador", "interior do filtro"], c: 1},
  {q: "O método de inspeção mais utilizado para detectar rachaduras em peças ferrosas é o:", a: ["Zyglo", "Raios-X", "Líquido penetrante", "Magnaflux ou partículas magnéticas"], c: 3}
    ];
    // ============================================

    // CONFIGURAÇÕES
    const QUESTIONS_PER_SIMULADO_PADRAO = 20;
    const MIN_WRONG_QUESTIONS_FOR_SIMULADO = 1;
    const MIN_PERCENT_FOR_SUCCESS = 70;
    const API_URL = "https://script.google.com/macros/s/AKfycbwcX8bNdrDQZ6sRB1sbG0COJe7aGYyBlOCPkno2JxbM-59_-FsWt4LCccUQ8DBLTy1S5g/exec";
    
    let QUESTIONS_PER_SIMULADO = QUESTIONS_PER_SIMULADO_PADRAO;
    let TIME_LIMIT = 0;
    let currentQuestions = [];
    let userAnswers = [];
    let timeLeft = 0;
    let timerId;
    let currentQuestionIndex = 0;
    let autoNavEnabled = true;
    let usedQuestionsHistory = [];
    let totalSimulados = 1;
    let currentSimuladoNumber = 1;
    let hasReachedEnd = false;
    let currentReportQuestionIndex = null;
    let currentSessionWrongQuestions = [];
    
    const HISTORY_KEY = `quiz_historico`;
    const DARK_MODE_KEY = 'dark_mode_enabled';
    const AUTO_SAVE_KEY = 'auto_save_progress';
    
    // ============================================
    // DARK MODE
    // ============================================
    function toggleDarkMode() {
        const isDark = document.body.classList.toggle('dark-mode');
        localStorage.setItem(DARK_MODE_KEY, isDark);
        const btn = document.querySelector('.dark-mode-btn');
        if (btn) btn.innerHTML = isDark ? '☀️ Light' : '🌙 Dark';
    }
    
    function loadDarkModePreference() {
        const saved = localStorage.getItem(DARK_MODE_KEY);
        if (saved === 'true') {
            document.body.classList.add('dark-mode');
            const btn = document.querySelector('.dark-mode-btn');
            if (btn) btn.innerHTML = '☀️ Light';
        }
    }
    
    // ============================================
    // SISTEMA DE REPORTE
    // ============================================
    const REPORT_TYPES = {
        error: "❌ Questão com erro",
        wrong_answer: "⚠️ Resposta incorreta",
        confusing: "🤔 Enunciado confuso",
        alternative: "🔤 Alternativas erradas",
        other: "📝 Outro problema"
    };
    
    function openReportModal(questionIndex) {
        currentReportQuestionIndex = questionIndex;
        if (!currentQuestions || currentQuestions.length === 0) { alert("Não há questões carregadas."); return; }
        const question = currentQuestions[questionIndex];
        document.getElementById('reportQuestionNumber').textContent = questionIndex + 1;
        let questionText = question.q.length > 150 ? question.q.substring(0, 147) + '...' : question.q;
        document.getElementById('reportQuestionText').textContent = questionText;
        document.querySelectorAll('input[name="reportType"]').forEach(radio => radio.checked = false);
        document.getElementById('reportDetails').value = '';
        document.getElementById('userName').value = '';
        document.getElementById('userEmail').value = '';
        document.getElementById('userInfo').value = '';
        document.getElementById('charCount').textContent = '0';
        document.getElementById('reportSuccess').style.display = 'none';
        document.getElementById('reportErrorMsg').style.display = 'none';
        document.getElementById('submitReport').disabled = false;
        document.getElementById('submitText').textContent = 'Enviar';
        document.getElementById('submitLoading').style.display = 'none';
        document.getElementById('reportModal').style.display = 'flex';
        setTimeout(() => { document.getElementById('userName').focus(); }, 100);
    }
    
    function closeReportModal() {
        document.getElementById('reportModal').style.display = 'none';
        currentReportQuestionIndex = null;
    }
    
    function showError(message) {
        const errorElement = document.getElementById('reportErrorMsg');
        errorElement.textContent = message;
        errorElement.style.display = 'block';
        setTimeout(() => { errorElement.style.display = 'none'; }, 5000);
    }
    
    function validateReportForm() {
        const name = document.getElementById('userName').value.trim();
        const email = document.getElementById('userEmail').value.trim();
        const reportType = document.querySelector('input[name="reportType"]:checked');
        if (!name) { showError('Preencha seu nome completo.'); return false; }
        if (!email) { showError('Preencha seu e-mail.'); return false; }
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) { showError('E-mail inválido.'); return false; }
        if (!reportType) { showError('Selecione o tipo de problema.'); return false; }
        return true;
    }
    
    async function submitReport() {
        if (!validateReportForm()) return;
        const questionIndex = currentReportQuestionIndex;
        const question = currentQuestions[questionIndex];
        const reportTypeValue = document.querySelector('input[name="reportType"]:checked').value;
        const reportData = {
            materia: document.title || "GMP 1 HANGAR MMA",
            questionNumber: questionIndex + 1,
            questionText: question.q,
            reportType: reportTypeValue,
            reportLabel: REPORT_TYPES[reportTypeValue],
            details: document.getElementById('reportDetails').value.trim(),
            userName: document.getElementById('userName').value.trim(),
            userEmail: document.getElementById('userEmail').value.trim(),
            userInfo: document.getElementById('userInfo').value.trim(),
            userAnswer: userAnswers[questionIndex] !== null ? question.a[userAnswers[questionIndex]] : 'Não respondida',
            correctAnswer: question.a[question.c],
            timestamp: new Date().toLocaleString('pt-BR'),
            url: window.location.href
        };
        document.getElementById('submitReport').disabled = true;
        document.getElementById('submitText').textContent = 'Enviando...';
        document.getElementById('submitLoading').style.display = 'inline-block';
        try {
            const formData = new FormData();
            Object.keys(reportData).forEach(key => formData.append(key, reportData[key]));
            await fetch(API_URL, { method: 'POST', body: formData, mode: 'no-cors' });
            document.getElementById('reportSuccess').style.display = 'block';
            document.getElementById('submitText').textContent = 'Enviado!';
            setTimeout(() => { closeReportModal(); }, 1500);
        } catch (error) {
            console.error('Erro:', error);
            showError('Erro ao enviar. Tente novamente.');
            document.getElementById('submitReport').disabled = false;
            document.getElementById('submitText').textContent = 'Enviar';
            document.getElementById('submitLoading').style.display = 'none';
        }
    }
    
    // ============================================
    // AUTO-SAVE PROGRESS
    // ============================================
    function autoSaveProgress() {
        if (!currentQuestions?.length) return;
        const progress = { currentQuestions, userAnswers, currentQuestionIndex, timeLeft, autoNavEnabled, currentSimuladoNumber, usedQuestionsHistory, currentSessionWrongQuestions, timestamp: Date.now() };
        localStorage.setItem(AUTO_SAVE_KEY, JSON.stringify(progress));
    }
    
    function loadAutoSaveProgress() {
        const saved = localStorage.getItem(AUTO_SAVE_KEY);
        if (!saved) return false;
        try {
            const progress = JSON.parse(saved);
            if ((Date.now() - progress.timestamp) < 3600000 && progress.currentQuestions?.length > 0) {
                if (confirm(`📀 Simulado em andamento (${progress.currentQuestions.length} questões). Continuar?`)) {
                    currentQuestions = progress.currentQuestions;
                    userAnswers = progress.userAnswers;
                    currentQuestionIndex = progress.currentQuestionIndex;
                    timeLeft = progress.timeLeft;
                    autoNavEnabled = progress.autoNavEnabled;
                    currentSimuladoNumber = progress.currentSimuladoNumber || 1;
                    usedQuestionsHistory = progress.usedQuestionsHistory || [];
                    currentSessionWrongQuestions = progress.currentSessionWrongQuestions || [];
                    TIME_LIMIT = calculateTimeLimit(currentQuestions.length);
                    if (timeLeft <= 0 || timeLeft > TIME_LIMIT) timeLeft = TIME_LIMIT;
                    document.getElementById('auto-nav-checkbox').checked = autoNavEnabled;
                    updateSimuladoInfo();
                    renderCurrentQuestion();
                    updateCounters();
                    updateNavButtons();
                    updateFinishButton();
                    startTimer();
                    return true;
                }
            }
            localStorage.removeItem(AUTO_SAVE_KEY);
        } catch(e) { localStorage.removeItem(AUTO_SAVE_KEY); }
        return false;
    }
    
    function clearAutoSave() { localStorage.removeItem(AUTO_SAVE_KEY); }
    
    // ============================================
    // FUNÇÕES AUXILIARES
    // ============================================
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    function formatTime(s) { return `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`; }
    function calculateTimeLimit(q) { return q * 60; }
    function getAnsweredCount() { return userAnswers.filter(a => a !== null).length; }
    
    function shuffleAlternatives(question) {
        const shuffled = { ...question };
        const indices = shuffleArray([0, 1, 2, 3]);
        shuffled.a = indices.map(i => question.a[i]);
        shuffled.c = indices.indexOf(question.c);
        return shuffled;
    }
    
    function syncPageTitle() {
        const pageTitle = document.title;
        const titleElement = document.getElementById('page-title');
        if (titleElement && pageTitle) titleElement.textContent = pageTitle;
    }
    
    function resetCurrentSessionWrongQuestions() { currentSessionWrongQuestions = []; }
    
    // ============================================
    // SELEÇÃO DE QUESTÕES
    // ============================================
    function calcularConfiguracaoSimulados() {
        const total = masterBank.length;
        if (total === 0) { totalSimulados = 1; QUESTIONS_PER_SIMULADO = 20; return; }
        if (total <= 27) { totalSimulados = 1; QUESTIONS_PER_SIMULADO = total; }
        else if (total >= 28 && total <= 39) { totalSimulados = 2; QUESTIONS_PER_SIMULADO = Math.ceil(total / 2); }
        else { totalSimulados = Math.ceil(total / 20); QUESTIONS_PER_SIMULADO = 20; }
    }
    
    function selectRandomQuestions(force = false) {
        const total = masterBank.length;
        if (total === 0) return [];
        calcularConfiguracaoSimulados();
        let available = [];
        for (let i = 0; i < total; i++) available.push(i);
        if (usedQuestionsHistory.length && !force) available = available.filter(i => !usedQuestionsHistory.includes(i));
        let toSelect = Math.min(QUESTIONS_PER_SIMULADO, available.length);
        if (toSelect === 0 && available.length === 0) {
            if (confirm(`Todas as ${total} questões foram usadas. Reiniciar?`)) {
                usedQuestionsHistory = [];
                localStorage.setItem(HISTORY_KEY, JSON.stringify(usedQuestionsHistory));
                available = Array.from({ length: total }, (_, i) => i);
                toSelect = Math.min(QUESTIONS_PER_SIMULADO, total);
            } else return [];
        }
        const selected = shuffleArray(available).slice(0, toSelect);
        usedQuestionsHistory.push(...selected);
        usedQuestionsHistory = [...new Set(usedQuestionsHistory)];
        localStorage.setItem(HISTORY_KEY, JSON.stringify(usedQuestionsHistory));
        return selected.map(idx => shuffleAlternatives({ ...masterBank[idx], originalIndex: idx }));
    }
    
    function generateWrongQuestionsSimulado() {
        if (currentSessionWrongQuestions.length === 0) return [];
        return shuffleArray([...currentSessionWrongQuestions]).map(idx => shuffleAlternatives({ ...masterBank[idx], originalIndex: idx, isWrongQuestion: true })).filter(q => q);
    }
    
    // ============================================
    // UI UPDATES
    // ============================================
    function updatePageTitle() {
        const total = masterBank.length;
        let text = '';
        if (currentQuestions?.[0]?.isWrongQuestion) text = ' (⚡ Reforço)';
        else if (totalSimulados > 1) text = ` (${currentSimuladoNumber}/${totalSimulados})`;
        document.getElementById('page-title').textContent = `${document.title}${text} (${currentQuestions?.length || 0}/${total})`;
    }
    
    function updateCounters() {
        const answered = getAnsweredCount();
        const total = currentQuestions?.length || 0;
        document.getElementById('question-counter').textContent = `${currentQuestionIndex + 1}/${total}`;
        document.getElementById('answered-counter').textContent = `${answered}/${total}`;
        document.getElementById('progress-percent').textContent = total ? Math.round((answered / total) * 100) + '%' : '0%';
        updateTimerDisplay();
    }
    
    function updateTimerDisplay() {
        const timer = document.getElementById('timer');
        timer.textContent = formatTime(timeLeft);
        if (timeLeft <= 300) timer.classList.add('timer-warning');
        else timer.classList.remove('timer-warning');
    }
    
    function updateNavButtons() {
        document.getElementById('prev-btn').disabled = currentQuestionIndex === 0;
        const isLast = currentQuestionIndex === (currentQuestions?.length - 1);
        document.getElementById('next-btn').disabled = isLast;
        document.getElementById('next-btn').innerHTML = isLast ? 'Última' : 'Próximo →';
    }
    
    function updateFinishButton() {
        const btn = document.getElementById('finish-btn');
        const allAnswered = getAnsweredCount() === currentQuestions?.length;
        btn.disabled = !allAnswered;
        if (allAnswered) {
            btn.innerHTML = '🏁 FINALIZAR';
            btn.classList.add('enabled');
        } else {
            btn.innerHTML = `❌ Faltam ${(currentQuestions?.length || 0) - getAnsweredCount()}`;
            btn.classList.remove('enabled');
        }
    }
    
    function updateSimuladoInfo() {
        const total = masterBank.length;
        const count = currentQuestions?.length || 0;
        const used = [...new Set(usedQuestionsHistory)].length;
        const remaining = Math.max(0, total - used);
        if (currentQuestions?.[0]?.isWrongQuestion) {
            document.getElementById('simulado-info').innerHTML = `
                <div style="color:var(--warning);font-weight:bold;text-align:center;">⚡ SIMULADO DE REFORÇO</div>
                <div style="text-align:center;font-size:0.6rem;">Questões que você errou</div>
                <div class="simulado-stats"><span>Questões: ${count}</span><span>Revisão: ${currentSessionWrongQuestions.length}</span></div>
                <div class="history-controls"><button class="clear-history-btn" onclick="clearHistory()">🗑️ Limpar</button><button class="info-history-btn" onclick="showHistoryInfo()">ℹ️ Info</button><button class="dark-mode-btn" onclick="toggleDarkMode()">🌙 Dark</button></div>
            `;
            return;
        }
        document.getElementById('simulado-info').innerHTML = `
            <div style="font-weight:600;">Simulado: ${count} questões</div>
            <div class="simulado-stats"><span>📦 Disponíveis: ${remaining}</span><span>✅ Usadas: ${used} (${total ? Math.round(used/total*100) : 0}%)</span></div>
            <div class="history-controls"><button class="clear-history-btn" onclick="clearHistory()">🗑️ Limpar</button><button class="info-history-btn" onclick="showHistoryInfo()">ℹ️ Info</button><button class="dark-mode-btn" onclick="toggleDarkMode()">🌙 Dark</button></div>
        `;
    }
    
    function updateReforcoButton() {
        const btn = document.getElementById('wrong-questions-btn');
        const hasEnough = currentSessionWrongQuestions.length >= MIN_WRONG_QUESTIONS_FOR_SIMULADO;
        const isReforco = currentQuestions?.[0]?.isWrongQuestion;
        const show = hasEnough && !isReforco && document.getElementById('results').style.display === 'block';
        btn.style.display = show ? 'block' : 'none';
        if (show) btn.innerHTML = `⚡ Reforço (${currentSessionWrongQuestions.length})`;
    }
    
    function updateContinuarBancoButton() {
        const btn = document.getElementById('continuar-banco-btn');
        const used = [...new Set(usedQuestionsHistory)].length;
        const remaining = Math.max(0, masterBank.length - used);
        const show = document.getElementById('results').style.display === 'block' && remaining > 0;
        btn.style.display = show ? 'block' : 'none';
        if (show) btn.innerHTML = `📚 Continuar (${remaining})`;
    }
    
    function removePendingShortcut() { document.getElementById('pending-shortcut')?.remove(); }
    
    function checkAndShowPendingButton() {
        if (!currentQuestions?.length) return;
        const pending = userAnswers.filter(a => a === null).length;
        const isLast = currentQuestionIndex === currentQuestions.length - 1;
        const hasAnsweredLast = userAnswers[currentQuestions.length - 1] !== null;
        removePendingShortcut();
        if (isLast && hasAnsweredLast && pending > 0 && document.getElementById('results').style.display !== 'block') {
            const div = document.createElement('div');
            div.id = 'pending-shortcut';
            div.className = 'pending-shortcut';
            div.onclick = goToNextPending;
            div.innerHTML = `<span>⚠️ ${pending}</span><span class="pending-count">IR AGORA</span><span>→</span>`;
            document.body.appendChild(div);
        }
    }
    
    function goToNextPending() {
        const pending = [];
        for (let i = 0; i < currentQuestions.length; i++) if (userAnswers[i] === null) pending.push(i);
        if (!pending.length) { removePendingShortcut(); return; }
        currentQuestionIndex = pending.find(i => i > currentQuestionIndex) ?? pending[0];
        saveAndRender();
    }
    
    function saveAndRender() {
        autoSaveProgress();
        renderCurrentQuestion();
        updateCounters();
        updateNavButtons();
        setTimeout(checkAndShowPendingButton, 100);
    }
    
    // ============================================
    // NAVEGAÇÃO
    // ============================================
    function startTimer() {
        clearInterval(timerId);
        timerId = setInterval(() => {
            timeLeft--;
            if (timeLeft % 10 === 0) autoSaveProgress();
            updateTimerDisplay();
            if (timeLeft <= 0) {
                clearInterval(timerId);
                if (getAnsweredCount() === currentQuestions.length) finalizeQuiz();
                else if (confirm('⏰ Tempo esgotado! Finalizar?')) finalizeQuiz();
            }
        }, 1000);
    }
    
    function nextQuestion() {
        if (currentQuestionIndex < currentQuestions.length - 1) {
            currentQuestionIndex++;
            saveAndRender();
        }
    }
    
    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            saveAndRender();
        }
    }
    
    function selectAnswer(idx) {
        userAnswers[currentQuestionIndex] = idx;
        autoSaveProgress();
        updateCounters();
        updateFinishButton();
        if (autoNavEnabled && currentQuestionIndex < currentQuestions.length - 1) {
            setTimeout(() => nextQuestion(), 200);
        }
        checkAndShowPendingButton();
    }
    
    function toggleAutoNav() {
        autoNavEnabled = !autoNavEnabled;
        document.getElementById('auto-nav-checkbox').checked = autoNavEnabled;
        autoSaveProgress();
    }
    
    function renderCurrentQuestion() {
        const container = document.getElementById('quiz-content');
        if (!currentQuestions?.length) { container.innerHTML = '<div class="question-block-mini">⚠️ Nenhuma questão</div>'; return; }
        const q = currentQuestions[currentQuestionIndex];
        container.innerHTML = `
            <div class="question-block-mini">
                <div class="question-text-mini">${currentQuestionIndex + 1}. ${q.q}</div>
                <div class="options-mini">
                    ${q.a.map((opt, i) => `
                        <label class="option-mini">
                            <input type="radio" name="q" value="${i}" ${userAnswers[currentQuestionIndex] === i ? 'checked' : ''} onchange="selectAnswer(${i})">
                            ${opt}
                        </label>
                    `).join('')}
                </div>
                <button class="report-btn" onclick="openReportModal(${currentQuestionIndex})"><span>⚠️</span> Reportar</button>
            </div>
        `;
        checkAndShowPendingButton();
    }
    
    // ============================================
    // FINALIZAR
    // ============================================
    function finalizeQuiz() {
        clearInterval(timerId);
        if (getAnsweredCount() !== currentQuestions.length && !confirm(`Faltam ${currentQuestions.length - getAnsweredCount()}. Finalizar?`)) {
            startTimer();
            return;
        }
        removePendingShortcut();
        let finalScore = 0;
        const sessionErrors = [];
        userAnswers.forEach((ans, i) => {
            if (ans !== null && ans === currentQuestions[i].c) finalScore++;
            else if (ans !== null && currentQuestions[i].originalIndex !== undefined) sessionErrors.push(currentQuestions[i].originalIndex);
        });
        currentSessionWrongQuestions = [...new Set(sessionErrors)];
        const percent = Math.round((finalScore / currentQuestions.length) * 100);
        const fb = document.getElementById('feedback-msg');
        if (percent >= 70) fb.innerHTML = "🎉 Excelente!";
        else if (percent >= 50) fb.innerHTML = "👍 Quase lá!";
        else fb.innerHTML = "💪 Continue praticando!";
        clearAutoSave();
        let quizHTML = '';
        currentQuestions.forEach((q, idx) => {
            const ua = userAnswers[idx];
            const isCorrect = ua === q.c;
            let opts = '';
            q.a.forEach((opt, i) => {
                let cls = 'option-mini';
                if (i === q.c) cls += ' correct-answer';
                else if (ua === i && !isCorrect) cls += ' wrong-answer';
                opts += `<label class="${cls}"><input type="radio" disabled ${ua === i ? 'checked' : ''}> ${opt}${ua === i ? ' <span style="font-size:0.6rem;">(sua)</span>' : ''}${i === q.c && ua !== i ? ' <span style="font-size:0.6rem; color:var(--success);">(correta)</span>' : ''}</label>`;
            });
            quizHTML += `<div class="question-block-mini"><div class="question-text-mini">${idx+1}. ${q.q}</div><div class="options-mini">${opts}</div><button class="results-report-btn" onclick="openReportModal(${idx})"><span>⚠️</span> Reportar</button></div>`;
        });
        document.getElementById('quiz-content').innerHTML = quizHTML;
        document.getElementById('final-score').textContent = `${finalScore}/${currentQuestions.length}`;
        document.getElementById('final-percent').textContent = `${percent}% de acertos`;
        
        const motivationElement = document.getElementById('motivation-message');
        if (currentQuestions[0]?.isWrongQuestion) {
            if (percent >= MIN_PERCENT_FOR_SUCCESS) {
                motivationElement.innerHTML = '✅ <strong>PARABÉNS!</strong> Você superou suas dificuldades!';
            } else {
                motivationElement.innerHTML = `⚡ <strong>PRECISA MELHORAR</strong><br>Acertou ${finalScore}/${currentQuestions.length}.<br>Faltam ${MIN_PERCENT_FOR_SUCCESS - percent}% para a meta.`;
            }
        } else {
            if (percent >= MIN_PERCENT_FOR_SUCCESS) {
                motivationElement.innerHTML = '🎯 <strong>ÓTIMO DESEMPENHO!</strong> Continue assim!';
            } else {
                motivationElement.innerHTML = '📚 <strong>CONTINUE ESTUDANDO!</strong> Você vai conseguir!';
            }
        }
        
        const total = masterBank.length;
        const used = [...new Set(usedQuestionsHistory)].length;
        const remaining = Math.max(0, total - used);
        const wrongCount = currentSessionWrongQuestions.length;
        let summaryText = '';
        if (currentQuestions[0]?.isWrongQuestion) {
            summaryText = `⚡ <strong>SIMULADO DE REFORÇO</strong><br>Você revisou ${currentQuestions.length} questões.<br>Ainda erradas: <strong>${wrongCount}</strong>`;
        } else if (remaining === 0) {
            summaryText = `🎯 <strong>COMPLETOU TODAS AS ${total} QUESTÕES!</strong><br>Erradas: <strong>${wrongCount}</strong>`;
        } else {
            summaryText = `📊 Restam: <strong>${remaining}</strong> | Usadas: <strong>${used}</strong><br>❌ Erros neste simulado: <strong>${wrongCount}</strong>`;
        }
        document.getElementById('simulado-summary').innerHTML = summaryText;
        document.querySelector('.nav-buttons').style.display = 'none';
        document.getElementById('results').style.display = 'block';
        document.getElementById('finish-btn').style.display = 'none';
        document.getElementById('restart-btn').style.display = 'block';
        updateSimuladoInfo();
        updateReforcoButton();
        updateContinuarBancoButton();
        const showReiniciarBanco = (currentQuestions[0]?.isWrongQuestion && percent < MIN_PERCENT_FOR_SUCCESS);
        document.getElementById('reiniciar-banco-btn').style.display = showReiniciarBanco ? 'block' : 'none';
        const voltarBtn = document.getElementById('voltar-inicio-btn');
        if (voltarBtn) voltarBtn.style.display = 'none';
    }
    
    // ============================================
    // AÇÕES DOS BOTÕES
    // ============================================
    function resetQuiz() {
        if (!confirm('Reiniciar este simulado?')) return;
        userAnswers.fill(null);
        timeLeft = TIME_LIMIT;
        currentQuestionIndex = 0;
        hasReachedEnd = false;
        document.getElementById('results').style.display = 'none';
        document.getElementById('finish-btn').style.display = 'block';
        document.getElementById('restart-btn').style.display = 'none';
        document.querySelector('.nav-buttons').style.display = 'grid';
        removePendingShortcut();
        autoSaveProgress();
        startTimer();
        renderCurrentQuestion();
        updateCounters();
        updateNavButtons();
        updateFinishButton();
    }
    
    function startNewQuiz() {
        document.getElementById('results').style.display = 'none';
        document.getElementById('finish-btn').style.display = 'block';
        document.getElementById('restart-btn').style.display = 'none';
        document.querySelector('.nav-buttons').style.display = 'grid';
        userAnswers.fill(null);
        timeLeft = TIME_LIMIT;
        currentQuestionIndex = 0;
        removePendingShortcut();
        startTimer();
        renderCurrentQuestion();
        updateCounters();
        updateNavButtons();
        updateFinishButton();
    }
    
    function showHistoryInfo() {
        const total = masterBank.length;
        const used = [...new Set(usedQuestionsHistory)].length;
        alert(`📊 Total: ${total} | Usadas: ${used} | Disponíveis: ${Math.max(0,total-used)} | Erros: ${currentSessionWrongQuestions.length}`);
    }
    
    function clearHistory() {
        if (!confirm('Limpar TODO o histórico? Isso reiniciará tudo.')) return;
        usedQuestionsHistory = [];
        localStorage.setItem(HISTORY_KEY, JSON.stringify(usedQuestionsHistory));
        clearAutoSave();
        resetCurrentSessionWrongQuestions();
        document.getElementById('results').style.display = 'none';
        document.getElementById('finish-btn').style.display = 'block';
        document.getElementById('restart-btn').style.display = 'none';
        document.querySelector('.nav-buttons').style.display = 'grid';
        currentQuestions = selectRandomQuestions(true);
        if (!currentQuestions.length) { alert("Erro!"); return; }
        userAnswers = new Array(currentQuestions.length).fill(null);
        currentQuestionIndex = 0;
        TIME_LIMIT = calculateTimeLimit(currentQuestions.length);
        timeLeft = TIME_LIMIT;
        autoNavEnabled = true;
        currentSimuladoNumber = 1;
        removePendingShortcut();
        syncPageTitle();
        updatePageTitle();
        updateSimuladoInfo();
        startTimer();
        renderCurrentQuestion();
        updateCounters();
        updateNavButtons();
        updateFinishButton();
        alert('✅ Histórico limpo!');
    }
    
    function continuarComBanco() {
        const total = masterBank.length;
        const used = [...new Set(usedQuestionsHistory)].length;
        const remaining = Math.max(0, total - used);
        if (remaining === 0) {
            if (confirm(`Todas as ${total} questões foram usadas. Reiniciar?`)) {
                usedQuestionsHistory = [];
                localStorage.setItem(HISTORY_KEY, JSON.stringify(usedQuestionsHistory));
                startNewSimulado();
            }
        } else {
            if (confirm(`Continuar com ${remaining} questões restantes?`)) startNewSimulado();
        }
    }
    
    function startNewSimulado() {
        resetCurrentSessionWrongQuestions();
        clearAutoSave();
        document.getElementById('results').style.display = 'none';
        document.getElementById('finish-btn').style.display = 'block';
        document.getElementById('restart-btn').style.display = 'none';
        document.querySelector('.nav-buttons').style.display = 'grid';
        currentQuestions = selectRandomQuestions(false);
        if (!currentQuestions.length) { alert("Erro!"); return; }
        userAnswers = new Array(currentQuestions.length).fill(null);
        currentQuestionIndex = 0;
        TIME_LIMIT = calculateTimeLimit(currentQuestions.length);
        timeLeft = TIME_LIMIT;
        autoNavEnabled = true;
        removePendingShortcut();
        updatePageTitle();
        updateSimuladoInfo();
        startTimer();
        renderCurrentQuestion();
        updateCounters();
        updateNavButtons();
        updateFinishButton();
        alert(`✅ Novo simulado com ${currentQuestions.length} questões!`);
    }
    
    function startWrongQuestionsSimulado() {
        currentQuestions = generateWrongQuestionsSimulado();
        if (!currentQuestions.length) { alert('Nenhuma questão errada.'); return; }
        currentSimuladoNumber = totalSimulados + 1;
        userAnswers = new Array(currentQuestions.length).fill(null);
        currentQuestionIndex = 0;
        TIME_LIMIT = calculateTimeLimit(currentQuestions.length);
        timeLeft = TIME_LIMIT;
        autoNavEnabled = true;
        removePendingShortcut();
        document.getElementById('results').style.display = 'none';
        document.getElementById('finish-btn').style.display = 'block';
        document.getElementById('restart-btn').style.display = 'none';
        document.querySelector('.nav-buttons').style.display = 'grid';
        updateSimuladoInfo();
        startTimer();
        renderCurrentQuestion();
        updateCounters();
        updateNavButtons();
        updateFinishButton();
        alert(`⚡ Reforço com ${currentQuestions.length} questões!`);
    }
    
    function voltarAoInicio() {
        if (!confirm('Voltar ao início? Todo progresso será perdido.')) return;
        usedQuestionsHistory = [];
        localStorage.setItem(HISTORY_KEY, JSON.stringify(usedQuestionsHistory));
        resetCurrentSessionWrongQuestions();
        clearAutoSave();
        document.getElementById('results').style.display = 'none';
        document.getElementById('finish-btn').style.display = 'block';
        document.getElementById('restart-btn').style.display = 'none';
        document.querySelector('.nav-buttons').style.display = 'grid';
        currentQuestions = selectRandomQuestions(true);
        if (!currentQuestions.length) { alert("Erro!"); return; }
        userAnswers = new Array(currentQuestions.length).fill(null);
        currentQuestionIndex = 0;
        TIME_LIMIT = calculateTimeLimit(currentQuestions.length);
        timeLeft = TIME_LIMIT;
        autoNavEnabled = true;
        currentSimuladoNumber = 1;
        removePendingShortcut();
        startTimer();
        renderCurrentQuestion();
        updateCounters();
        updateNavButtons();
        updateFinishButton();
        updateSimuladoInfo();
        alert('✅ Sistema reiniciado!');
    }
    
    function reiniciarBancoCompleto() { voltarAoInicio(); }
    
    // ============================================
    // INICIALIZAÇÃO
    // ============================================
    function initQuiz() {
        syncPageTitle();
        loadDarkModePreference();
        if (!masterBank.length) {
            document.getElementById('quiz-content').innerHTML = '<div class="question-block-mini" style="text-align:center;color:var(--danger);">⚠️ Banco vazio! Adicione questões no array masterBank</div>';
            return;
        }
        calcularConfiguracaoSimulados();
        const saved = localStorage.getItem(HISTORY_KEY);
        if (saved) try { usedQuestionsHistory = JSON.parse(saved); } catch(e) { usedQuestionsHistory = []; }
        resetCurrentSessionWrongQuestions();
        if (!loadAutoSaveProgress()) {
            currentQuestions = selectRandomQuestions();
            if (!currentQuestions.length) return;
            userAnswers = new Array(currentQuestions.length).fill(null);
            currentQuestionIndex = 0;
            TIME_LIMIT = calculateTimeLimit(currentQuestions.length);
            timeLeft = TIME_LIMIT;
            autoNavEnabled = true;
        }
        updatePageTitle();
        document.getElementById('timer').textContent = formatTime(timeLeft);
        document.getElementById('auto-nav-checkbox').checked = autoNavEnabled;
        updateSimuladoInfo();
        startTimer();
        renderCurrentQuestion();
        updateCounters();
        updateNavButtons();
        updateFinishButton();
        updateReforcoButton();
        updateContinuarBancoButton();
    }
    
    window.initQuiz = initQuiz;
    window.onload = initQuiz;
</script>
</body>
</html>
