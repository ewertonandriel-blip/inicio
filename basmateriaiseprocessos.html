<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAS - MATERIAIS DE AVIAÇÃO E PROCESSOS</title>
    <style>
        /* ============================================
           DESIGN SYSTEM - TEMA AZUL - COMPACTADO PARA CELULAR
           Todas as funcionalidades originais preservadas
        ============================================ */
        :root {
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --primary-dark: #1d4ed8;
            --primary-gradient: linear-gradient(135deg, #2563eb, #06b6d4);
            --secondary: #0284c7;
            --success: #10b981;
            --success-dark: #059669;
            --danger: #ef4444;
            --danger-dark: #dc2626;
            --warning: #f59e0b;
            --info: #0ea5e9;
            --bg-body: linear-gradient(135deg, #eff6ff 0%, #e0f2fe 100%);
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #475569;
            --text-light: #94a3b8;
            --border-light: #cbd5e1;
            --border-radius-sm: 6px;
            --border-radius-md: 10px;
            --border-radius-lg: 14px;
            --border-radius-xl: 20px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 2px 4px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 4px 6px -2px rgba(0, 0, 0, 0.1);
            --transition-default: all 0.2s ease;
        }

        body.dark-mode {
            --bg-body: linear-gradient(135deg, #0f172a 0%, #082f49 100%);
            --bg-card: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --text-light: #64748b;
            --border-light: #334155;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 4px;
            line-height: 1.4;
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        .container { 
            max-width: 500px; 
            margin: 0 auto; 
            position: relative; 
        }

        .credits-integrated {
            text-align: center;
            font-size: 0.55rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            display: inline-block;
            padding: 2px 10px;
            border-radius: 30px;
            width: auto;
            margin-left: auto;
            margin-right: auto;
        }

        body.dark-mode .credits-integrated {
            background: rgba(30, 41, 59, 0.5);
        }

        .header-mini {
            position: sticky;
            top: 4px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            padding: 6px 10px;
            border-radius: var(--border-radius-xl);
            box-shadow: var(--shadow-md);
            z-index: 100;
            margin-bottom: 6px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        body.dark-mode .header-mini {
            background: rgba(30, 41, 59, 0.85);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .header-mini-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .page-title-mini {
            margin: 0;
            font-size: 0.8rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.3px;
        }

        .timer-compact {
            background: var(--bg-card);
            color: var(--primary);
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 800;
            border: 1.5px solid var(--primary-light);
            font-family: monospace;
        }

        .timer-warning {
            background: var(--danger) !important;
            color: white !important;
            border-color: var(--danger-dark) !important;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .simulado-info {
            background: rgba(37, 99, 235, 0.08);
            border-radius: var(--border-radius-md);
            padding: 5px 10px;
            margin-bottom: 4px;
            border: 1px solid rgba(37, 99, 235, 0.15);
            font-size: 0.65rem;
        }

        body.dark-mode .simulado-info {
            background: rgba(37, 99, 235, 0.12);
        }

        .simulado-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.6rem;
            font-weight: 600;
            margin-top: 3px;
            color: var(--text-muted);
        }

        .history-controls {
            display: flex;
            gap: 4px;
            margin-top: 5px;
            flex-wrap: wrap;
        }

        .history-controls button {
            padding: 3px 8px;
            border: none;
            border-radius: 25px;
            font-size: 0.55rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-default);
            background: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border-light);
        }

        .history-controls button:hover {
            transform: translateY(-1px);
        }

        .clear-history-btn {
            background: #fef3c7 !important;
            color: #92400e !important;
            border-color: #fde68a !important;
        }

        body.dark-mode .clear-history-btn {
            background: #7c2d12 !important;
            color: #fed7aa !important;
            border-color: #9a3412 !important;
        }

        .info-history-btn {
            background: #e2e8f0 !important;
        }

        .dark-mode-btn {
            background: var(--primary-gradient) !important;
            color: white !important;
            border: none !important;
        }

        .quiz-info-mini {
            background: var(--bg-card);
            border-radius: var(--border-radius-md);
            padding: 6px 10px;
            margin-bottom: 0;
            border: 1px solid var(--border-light);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 6px;
        }

        .info-item {
            text-align: center;
            background: rgba(37, 99, 235, 0.06);
            padding: 4px 2px;
            border-radius: var(--border-radius-sm);
        }

        .info-label { 
            font-size: 0.45rem; 
            color: var(--text-muted); 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }
        .info-value { 
            font-size: 0.75rem; 
            font-weight: 800; 
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls-compact { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap;
            gap: 6px;
        }

        .auto-nav-toggle {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--text-main);
            background: rgba(37, 99, 235, 0.08);
            padding: 3px 8px;
            border-radius: 25px;
            cursor: pointer;
        }

        .reset-btn-mini {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 25px;
            padding: 3px 10px;
            font-size: 0.6rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-main);
        }

        .question-block-mini {
            background: var(--bg-card);
            padding: 10px;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-md);
            margin-top: 6px;
            margin-bottom: 8px;
            animation: slideIn 0.3s ease-out;
            border: 1px solid var(--border-light);
            position: relative;
        }

        @keyframes slideIn { 
            from { opacity: 0; transform: translateY(5px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .question-text-mini {
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-main);
            line-height: 1.4;
        }

        .options-mini { 
            display: flex; 
            flex-direction: column; 
            gap: 5px; 
        }

        .option-mini {
            padding: 7px 10px;
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border-light);
            border-radius: var(--border-radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            font-size: 0.75rem;
            font-weight: 500;
            transition: var(--transition-default);
        }

        body.dark-mode .option-mini {
            background: rgba(255, 255, 255, 0.03);
        }

        .option-mini:hover {
            border-color: var(--primary-light);
            background: rgba(37, 99, 235, 0.05);
        }

        .option-mini input[type="radio"] {
            margin-right: 8px;
            width: 14px;
            height: 14px;
            flex-shrink: 0;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .option-mini:has(input:checked) {
            border-color: var(--primary);
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.08), rgba(6, 182, 212, 0.08));
        }

        .correct-answer {
            background: linear-gradient(135deg, #dcfce7, #bbf7d0) !important;
            border-color: var(--success) !important;
            color: #166534 !important;
        }

        body.dark-mode .correct-answer {
            background: linear-gradient(135deg, #14532d, #166534) !important;
            color: #86efac !important;
        }

        .wrong-answer {
            background: linear-gradient(135deg, #fee2e2, #fecaca) !important;
            border-color: var(--danger) !important;
            color: #991b1b !important;
        }

        body.dark-mode .wrong-answer {
            background: linear-gradient(135deg, #7f1d1d, #991b1b) !important;
            color: #fca5a5 !important;
        }

        .report-btn, .results-report-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.6rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: var(--text-muted);
        }

        .report-btn:hover, .results-report-btn:hover {
            background: var(--danger);
            border-color: var(--danger);
            color: white;
        }

        .nav-buttons { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 6px; 
            margin-bottom: 8px; 
        }

        .nav-btn {
            padding: 8px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-finish {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #94a3b8, #64748b);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.8rem;
            margin-bottom: 12px;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-finish.enabled {
            background: linear-gradient(135deg, var(--success), var(--success-dark));
            cursor: pointer;
            opacity: 1;
        }

        #results {
            background: var(--bg-card);
            border-radius: var(--border-radius-lg);
            padding: 12px 10px;
            text-align: center;
            margin-bottom: 12px;
            border: 1px solid var(--border-light);
            display: none;
        }

        .result-title { 
            font-size: 0.95rem; 
            font-weight: 800; 
            margin-bottom: 4px; 
        }

        .score-mini { 
            font-size: 2rem; 
            font-weight: 900; 
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 5px 0; 
        }

        #final-percent { 
            font-weight: 700; 
            color: var(--primary-light); 
            margin-bottom: 6px; 
            font-size: 0.85rem;
        }

        .motivation-message {
            padding: 8px;
            border-radius: var(--border-radius-md);
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 0.7rem;
            background: linear-gradient(135deg, #fffbeb, #fef3c7);
            border: 1px solid #fde68a;
            color: #92400e;
        }

        body.dark-mode .motivation-message {
            background: linear-gradient(135deg, #451a03, #78350f);
            border-color: #9a3412;
            color: #fde68a;
        }

        .pending-shortcut {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary-gradient);
            color: white;
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 800;
            z-index: 1000;
            display: flex;
            gap: 10px;
            align-items: center;
            border: none;
            cursor: pointer;
        }

        .pending-shortcut .pending-count {
            background: white;
            color: var(--primary);
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 900;
        }

        @media (max-width: 480px) {
            body { padding: 3px; }
            .question-block-mini { padding: 8px; }
            .option-mini { padding: 6px 8px; font-size: 0.7rem; }
            .pending-shortcut { padding: 6px 14px; font-size: 0.7rem; bottom: 12px; }
        }

        .report-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .report-content {
            background: var(--bg-card);
            padding: 16px;
            border-radius: var(--border-radius-xl);
            width: 100%;
            max-width: 450px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .report-title {
            font-size: 1.1rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            text-align: center;
            padding-bottom: 8px;
        }

        .report-question-info {
            background: rgba(37, 99, 235, 0.06);
            border-radius: var(--border-radius-md);
            padding: 10px;
            margin-bottom: 12px;
            border-left: 3px solid var(--primary);
        }

        .report-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            border: 1px solid var(--border-light);
            border-radius: var(--border-radius-md);
            cursor: pointer;
            margin-bottom: 6px;
        }

        .report-option:hover {
            border-color: var(--primary);
            background: rgba(37, 99, 235, 0.05);
        }

        .user-info-form {
            background: rgba(37, 99, 235, 0.05);
            border-radius: var(--border-radius-md);
            padding: 12px;
            margin: 12px 0;
        }

        .form-group {
            margin-bottom: 10px;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .form-input, .report-textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border-light);
            border-radius: var(--border-radius-md);
            font-size: 0.8rem;
            background: var(--bg-card);
            color: var(--text-main);
        }

        .report-textarea {
            min-height: 80px;
            resize: vertical;
        }

        .report-buttons {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .report-submit {
            flex: 2;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 10px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
        }

        .report-cancel {
            flex: 1;
            background: #6b7280;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }

        .report-success {
            background: #dcfce7;
            color: #166534;
            padding: 10px;
            border-radius: var(--border-radius-md);
            text-align: center;
            margin-top: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            display: none;
        }

        .report-error {
            background: #fee2e2;
            color: #991b1b;
            padding: 8px;
            border-radius: var(--border-radius-md);
            margin: 8px 0;
            font-size: 0.75rem;
            display: none;
        }

        .required-star {
            color: var(--danger);
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div class="credits-integrated">BY EWERTON</div>
    
    <div class="header-mini">
        <div class="header-mini-top">
            <h1 class="page-title-mini" id="page-title">Carregando...</h1>
            <div id="timer" class="timer-compact">00:00</div>
        </div>
        
        <div class="simulado-info" id="simulado-info">
            <div>Simulado: <span id="questions-per-simulado">20</span> questões</div>
            <div class="simulado-stats">
                <span id="remaining-questions">Disponíveis: 0</span>
                <span id="recent-used">Usadas: 0</span>
            </div>
            <div class="history-controls">
                <button class="clear-history-btn" onclick="clearHistory()">🗑️ Limpar</button>
                <button class="info-history-btn" onclick="showHistoryInfo()">ℹ️ Info</button>
                <button class="dark-mode-btn" onclick="toggleDarkMode()">🌙 Dark</button>
            </div>
        </div>
        
        <div class="quiz-info-mini">
            <div class="info-grid">
                <div class="info-item"><div class="info-label">Questão</div><div class="info-value" id="question-counter">0/0</div></div>
                <div class="info-item"><div class="info-label">Respondidas</div><div class="info-value" id="answered-counter">0/0</div></div>
                <div class="info-item"><div class="info-label">Progresso</div><div class="info-value" id="progress-percent">0%</div></div>
            </div>
            <div class="controls-compact">
                <div class="auto-nav-toggle" onclick="toggleAutoNav()"><input type="checkbox" id="auto-nav-checkbox" class="auto-nav-checkbox" checked><label>Auto-avançar</label></div>
                <button class="reset-btn-mini" onclick="resetQuiz()">↻ Reiniciar</button>
            </div>
        </div>
    </div>

    <div id="results">
        <div class="result-title" id="feedback-msg"></div>
        <div class="score-mini" id="final-score"></div>
        <div id="final-percent"></div>
        <div id="motivation-message" class="motivation-message"></div>
        <div id="simulado-summary" style="margin-bottom: 8px; font-size: 0.65rem;"></div>
        
        <button id="restart-btn" class="nav-btn" style="display:none;" onclick="startNewQuiz()">🔄 Refazer</button>
        <button id="voltar-inicio-btn" class="nav-btn" style="display:none;" onclick="voltarAoInicio()">🏁 Voltar ao Início</button>
        <button id="continuar-banco-btn" class="nav-btn" style="display:none;" onclick="continuarComBanco()">📚 Continuar com Banco</button>
        <button id="wrong-questions-btn" class="nav-btn" style="display:none;" onclick="startWrongQuestionsSimulado()">⚡ Reforço</button>
        <button id="reiniciar-banco-btn" class="nav-btn" style="display:none;" onclick="reiniciarBancoCompleto()">🔄 Reiniciar Banco</button>
    </div>

    <div id="quiz-content"></div>

    <div class="nav-buttons">
        <button id="prev-btn" class="nav-btn" onclick="prevQuestion()" disabled>← Anterior</button>
        <button id="next-btn" class="nav-btn" onclick="nextQuestion()">Próximo →</button>
    </div>

    <button id="finish-btn" class="btn-finish" onclick="finalizeQuiz()" disabled>FINALIZAR SIMULADO</button>
</div>

<div id="reportModal" class="report-modal">
    <div class="report-content">
        <div class="report-title">📝 Reportar Questão</div>
        <div class="report-question-info">
            <div><strong>Questão #<span id="reportQuestionNumber">1</span></strong></div>
            <div id="reportQuestionText" style="font-size: 0.8rem; margin-top: 5px;">Carregando...</div>
        </div>
        <div class="report-section">
            <div class="report-section-title" style="font-weight:700; margin-bottom:8px;">📌 Tipo de Problema</div>
            <div class="report-options">
                <div class="report-option"><input type="radio" id="reportError" name="reportType" value="error"><label for="reportError">❌ Questão com erro</label></div>
                <div class="report-option"><input type="radio" id="reportWrongAnswer" name="reportType" value="wrong_answer"><label for="reportWrongAnswer">⚠️ Resposta incorreta</label></div>
                <div class="report-option"><input type="radio" id="reportConfusing" name="reportType" value="confusing"><label for="reportConfusing">🤔 Enunciado confuso</label></div>
                <div class="report-option"><input type="radio" id="reportAlternative" name="reportType" value="alternative"><label for="reportAlternative">🔤 Alternativas erradas</label></div>
                <div class="report-option"><input type="radio" id="reportOther" name="reportType" value="other"><label for="reportOther">📝 Outro problema</label></div>
            </div>
        </div>
        <div class="report-section">
            <div class="report-section-title" style="font-weight:700; margin-bottom:8px;">👤 Sua Identificação <span class="required-star">*</span></div>
            <div class="user-info-form">
                <div class="form-group"><label class="form-label">Nome Completo <span class="required-star">*</span></label><input type="text" id="userName" class="form-input" placeholder="Digite seu nome completo" maxlength="100"></div>
                <div class="form-group"><label class="form-label">E-mail <span class="required-star">*</span></label><input type="email" id="userEmail" class="form-input" placeholder="seu.email@exemplo.com" maxlength="100"></div>
                <div class="form-group"><label class="form-label">Instituição/Curso (opcional)</label><input type="text" id="userInfo" class="form-input" placeholder="Ex: SENAI, Engenharia" maxlength="100"></div>

    const MIN_PERCENT_FOR_SUCCESS = 70;
    const API_URL = "https://script.google.com/macros/s/AKfycbwcX8bNdrDQZ6sRB1sbG0COJe7aGYyBlOCPkno2JxbM-59_-FsWt4LCccUQ8DBLTy1S5g/exec";
    
    let QUESTIONS_PER_SIMULADO = QUESTIONS_PER_SIMULADO_PADRAO;
    let TIME_LIMIT = 0;
    let currentQuestions = [];
    let userAnswers = [];
    let timeLeft = 0;
    let timerId;
    let currentQuestionIndex = 0;
    let autoNavEnabled = true;
    let usedQuestionsHistory = [];
    let totalSimulados = 1;
    let currentSimuladoNumber = 1;
    let hasReachedEnd = false;
    let currentReportQuestionIndex = null;
    let currentSessionWrongQuestions = [];
    
    const HISTORY_KEY = `quiz_historico`;
    const DARK_MODE_KEY = 'dark_mode_enabled';
    const AUTO_SAVE_KEY = 'auto_save_progress';
    
    // ============================================
    // DARK MODE
    // ============================================
    function toggleDarkMode() {
        const isDark = document.body.classList.toggle('dark-mode');
        localStorage.setItem(DARK_MODE_KEY, isDark);
        const btn = document.querySelector('.dark-mode-btn');
        if (btn) btn.innerHTML = isDark ? '☀️ Light' : '🌙 Dark';
    }
    
    function loadDarkModePreference() {
        const saved = localStorage.getItem(DARK_MODE_KEY);
        if (saved === 'true') {
            document.body.classList.add('dark-mode');
            const btn = document.querySelector('.dark-mode-btn');
            if (btn) btn.innerHTML = '☀️ Light';
        }
    }
    
    // ============================================
    // SISTEMA DE REPORTE
    // ============================================
    const REPORT_TYPES = {
        error: "❌ Questão com erro",
        wrong_answer: "⚠️ Resposta incorreta",
        confusing: "🤔 Enunciado confuso",
        alternative: "🔤 Alternativas erradas",
        other: "📝 Outro problema"
    };
    
    function openReportModal(questionIndex) {
        currentReportQuestionIndex = questionIndex;
        if (!currentQuestions || currentQuestions.length === 0) { alert("Não há questões carregadas."); return; }
        const question = currentQuestions[questionIndex];
        document.getElementById('reportQuestionNumber').textContent = questionIndex + 1;
        let questionText = question.q.length > 150 ? question.q.substring(0, 147) + '...' : question.q;
        document.getElementById('reportQuestionText').textContent = questionText;
        document.querySelectorAll('input[name="reportType"]').forEach(radio => radio.checked = false);
        document.getElementById('reportDetails').value = '';
        document.getElementById('userName').value = '';
        document.getElementById('userEmail').value = '';
        document.getElementById('userInfo').value = '';
        document.getElementById('charCount').textContent = '0';
        document.getElementById('reportSuccess').style.display = 'none';
        document.getElementById('reportErrorMsg').style.display = 'none';
        document.getElementById('submitReport').disabled = false;
        document.getElementById('submitText').textContent = 'Enviar';
        document.getElementById('submitLoading').style.display = 'none';
        document.getElementById('reportModal').style.display = 'flex';
        setTimeout(() => { document.getElementById('userName').focus(); }, 100);
    }
    
    function closeReportModal() {
        document.getElementById('reportModal').style.display = 'none';
        currentReportQuestionIndex = null;
    }
    
    function showError(message) {
        const errorElement = document.getElementById('reportErrorMsg');
        errorElement.textContent = message;
        errorElement.style.display = 'block';
        setTimeout(() => { errorElement.style.display = 'none'; }, 5000);
    }
    
    function validateReportForm() {
        const name = document.getElementById('userName').value.trim();
        const email = document.getElementById('userEmail').value.trim();
        const reportType = document.querySelector('input[name="reportType"]:checked');
        if (!name) { showError('Preencha seu nome completo.'); return false; }
        if (!email) { showError('Preencha seu e-mail.'); return false; }
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) { showError('E-mail inválido.'); return false; }
        if (!reportType) { showError('Selecione o tipo de problema.'); return false; }
        return true;
    }
    
    async function submitReport() {
        if (!validateReportForm()) return;
        const questionIndex = currentReportQuestionIndex;
        const question = currentQuestions[questionIndex];
        const reportTypeValue = document.querySelector('input[name="reportType"]:checked').value;
        const reportData = {
            materia: document.title || "GMP 1 HANGAR MMA",
            questionNumber: questionIndex + 1,
            questionText: question.q,
            reportType: reportTypeValue,
            reportLabel: REPORT_TYPES[reportTypeValue],
            details: document.getElementById('reportDetails').value.trim(),
            userName: document.getElementById('userName').value.trim(),
            userEmail: document.getElementById('userEmail').value.trim(),
            userInfo: document.getElementById('userInfo').value.trim(),
            userAnswer: userAnswers[questionIndex] !== null ? question.a[userAnswers[questionIndex]] : 'Não respondida',
            correctAnswer: question.a[question.c],
            timestamp: new Date().toLocaleString('pt-BR'),
            url: window.location.href
        };
        document.getElementById('submitReport').disabled = true;
        document.getElementById('submitText').textContent = 'Enviando...';
        document.getElementById('submitLoading').style.display = 'inline-block';
        try {
            const formData = new FormData();
            Object.keys(reportData).forEach(key => formData.append(key, reportData[key]));
            await fetch(API_URL, { method: 'POST', body: formData, mode: 'no-cors' });
            document.getElementById('reportSuccess').style.display = 'block';
            document.getElementById('submitText').textContent = 'Enviado!';
            setTimeout(() => { closeReportModal(); }, 1500);
        } catch (error) {
            console.error('Erro:', error);
            showError('Erro ao enviar. Tente novamente.');
            document.getElementById('submitReport').disabled = false;
            document.getElementById('submitText').textContent = 'Enviar';
            document.getElementById('submitLoading').style.display = 'none';
        }
    }
    
    // ============================================
    // AUTO-SAVE PROGRESS
    // ============================================
    function autoSaveProgress() {
        if (!currentQuestions?.length) return;
        const progress = { currentQuestions, userAnswers, currentQuestionIndex, timeLeft, autoNavEnabled, currentSimuladoNumber, usedQuestionsHistory, currentSessionWrongQuestions, timestamp: Date.now() };
        localStorage.setItem(AUTO_SAVE_KEY, JSON.stringify(progress));
    }
    
    function loadAutoSaveProgress() {
        const saved = localStorage.getItem(AUTO_SAVE_KEY);
        if (!saved) return false;
        try {
            const progress = JSON.parse(saved);
            if ((Date.now() - progress.timestamp) < 3600000 && progress.currentQuestions?.length > 0) {
                if (confirm(`📀 Simulado em andamento (${progress.currentQuestions.length} questões). Continuar?`)) {
                    currentQuestions = progress.currentQuestions;
                    userAnswers = progress.userAnswers;
                    currentQuestionIndex = progress.currentQuestionIndex;
                    timeLeft = progress.timeLeft;
                    autoNavEnabled = progress.autoNavEnabled;
                    currentSimuladoNumber = progress.currentSimuladoNumber || 1;
                    usedQuestionsHistory = progress.usedQuestionsHistory || [];
                    currentSessionWrongQuestions = progress.currentSessionWrongQuestions || [];
                    TIME_LIMIT = calculateTimeLimit(currentQuestions.length);
                    if (timeLeft <= 0 || timeLeft > TIME_LIMIT) timeLeft = TIME_LIMIT;
                    document.getElementById('auto-nav-checkbox').checked = autoNavEnabled;
                    updateSimuladoInfo();
                    renderCurrentQuestion();
                    updateCounters();
                    updateNavButtons();
                    updateFinishButton();
                    startTimer();
                    return true;
                }
            }
            localStorage.removeItem(AUTO_SAVE_KEY);
        } catch(e) { localStorage.removeItem(AUTO_SAVE_KEY); }
        return false;
    }
    
    function clearAutoSave() { localStorage.removeItem(AUTO_SAVE_KEY); }
    
    // ============================================
    // FUNÇÕES AUXILIARES
    // ============================================
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    function formatTime(s) { return `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`; }
    function calculateTimeLimit(q) { return q * 60; }
    function getAnsweredCount() { return userAnswers.filter(a => a !== null).length; }
    
    function shuffleAlternatives(question) {
        const shuffled = { ...question };
        const indices = shuffleArray([0, 1, 2, 3]);
        shuffled.a = indices.map(i => question.a[i]);
        shuffled.c = indices.indexOf(question.c);
        return shuffled;
    }
    
    function syncPageTitle() {
        const pageTitle = document.title;
        const titleElement = document.getElementById('page-title');
        if (titleElement && pageTitle) titleElement.textContent = pageTitle;
    }
    
    function resetCurrentSessionWrongQuestions() { currentSessionWrongQuestions = []; }
    
    // ============================================
    // SELEÇÃO DE QUESTÕES
    // ============================================
    function calcularConfiguracaoSimulados() {
        const total = masterBank.length;
        if (total === 0) { totalSimulados = 1; QUESTIONS_PER_SIMULADO = 20; return; }
        if (total <= 27) { totalSimulados = 1; QUESTIONS_PER_SIMULADO = total; }
        else if (total >= 28 && total <= 39) { totalSimulados = 2; QUESTIONS_PER_SIMULADO = Math.ceil(total / 2); }
        else { totalSimulados = Math.ceil(total / 20); QUESTIONS_PER_SIMULADO = 20; }
    }
    
    function selectRandomQuestions(force = false) {
        const total = masterBank.length;
        if (total === 0) return [];
        calcularConfiguracaoSimulados();
        let available = [];
        for (let i = 0; i < total; i++) available.push(i);
        if (usedQuestionsHistory.length && !force) available = available.filter(i => !usedQuestionsHistory.includes(i));
        let toSelect = Math.min(QUESTIONS_PER_SIMULADO, available.length);
        if (toSelect === 0 && available.length === 0) {
            if (confirm(`Todas as ${total} questões foram usadas. Reiniciar?`)) {
                usedQuestionsHistory = [];
                localStorage.setItem(HISTORY_KEY, JSON.stringify(usedQuestionsHistory));
                available = Array.from({ length: total }, (_, i) => i);
                toSelect = Math.min(QUESTIONS_PER_SIMULADO, total);
            } else return [];
        }
        const selected = shuffleArray(available).slice(0, toSelect);
        usedQuestionsHistory.push(...selected);
        usedQuestionsHistory = [...new Set(usedQuestionsHistory)];
        localStorage.setItem(HISTORY_KEY, JSON.stringify(usedQuestionsHistory));
        return selected.map(idx => shuffleAlternatives({ ...masterBank[idx], originalIndex: idx }));
    }
    
    function generateWrongQuestionsSimulado() {
        if (currentSessionWrongQuestions.length === 0) return [];
        return shuffleArray([...currentSessionWrongQuestions]).map(idx => shuffleAlternatives({ ...masterBank[idx], originalIndex: idx, isWrongQuestion: true })).filter(q => q);
    }
    
    // ============================================
    // UI UPDATES
    // ============================================
    function updatePageTitle() {
        const total = masterBank.length;
        let text = '';
        if (currentQuestions?.[0]?.isWrongQuestion) text = ' (⚡ Reforço)';
        else if (totalSimulados > 1) text = ` (${currentSimuladoNumber}/${totalSimulados})`;
        document.getElementById('page-title').textContent = `${document.title}${text} (${currentQuestions?.length || 0}/${total})`;
    }
    
    function updateCounters() {
        const answered = getAnsweredCount();
        const total = currentQuestions?.length || 0;
        document.getElementById('question-counter').textContent = `${currentQuestionIndex + 1}/${total}`;
        document.getElementById('answered-counter').textContent = `${answered}/${total}`;
        document.getElementById('progress-percent').textContent = total ? Math.round((answered / total) * 100) + '%' : '0%';
        updateTimerDisplay();
    }
    
    function updateTimerDisplay() {
        const timer = document.getElementById('timer');
        timer.textContent = formatTime(timeLeft);
        if (timeLeft <= 300) timer.classList.add('timer-warning');
        else timer.classList.remove('timer-warning');
    }
    
    function updateNavButtons() {
        document.getElementById('prev-btn').disabled = currentQuestionIndex === 0;
        const isLast = currentQuestionIndex === (currentQuestions?.length - 1);
        document.getElementById('next-btn').disabled = isLast;
        document.getElementById('next-btn').innerHTML = isLast ? 'Última' : 'Próximo →';
    }
    
    function updateFinishButton() {
        const btn = document.getElementById('finish-btn');
        const allAnswered = getAnsweredCount() === currentQuestions?.length;
        btn.disabled = !allAnswered;
        if (allAnswered) {
            btn.innerHTML = '🏁 FINALIZAR';
            btn.classList.add('enabled');
        } else {
            btn.innerHTML = `❌ Faltam ${(currentQuestions?.length || 0) - getAnsweredCount()}`;
            btn.classList.remove('enabled');
        }
    }
    
    function updateSimuladoInfo() {
        const total = masterBank.length;
        const count = currentQuestions?.length || 0;
        const used = [...new Set(usedQuestionsHistory)].length;
        const remaining = Math.max(0, total - used);
        if (currentQuestions?.[0]?.isWrongQuestion) {
            document.getElementById('simulado-info').innerHTML = `
                <div style="color:var(--warning);font-weight:bold;text-align:center;">⚡ SIMULADO DE REFORÇO</div>
                <div style="text-align:center;font-size:0.6rem;">Questões que você errou</div>
                <div class="simulado-stats"><span>Questões: ${count}</span><span>Revisão: ${currentSessionWrongQuestions.length}</span></div>
                <div class="history-controls"><button class="clear-history-btn" onclick="clearHistory()">🗑️ Limpar</button><button class="info-history-btn" onclick="showHistoryInfo()">ℹ️ Info</button><button class="dark-mode-btn" onclick="toggleDarkMode()">🌙 Dark</button></div>
            `;
            return;
        }
        document.getElementById('simulado-info').innerHTML = `
            <div style="font-weight:600;">Simulado: ${count} questões</div>
            <div class="simulado-stats"><span>📦 Disponíveis: ${remaining}</span><span>✅ Usadas: ${used} (${total ? Math.round(used/total*100) : 0}%)</span></div>
            <div class="history-controls"><button class="clear-history-btn" onclick="clearHistory()">🗑️ Limpar</button><button class="info-history-btn" onclick="showHistoryInfo()">ℹ️ Info</button><button class="dark-mode-btn" onclick="toggleDarkMode()">🌙 Dark</button></div>
        `;
    }
    
    function updateReforcoButton() {
        const btn = document.getElementById('wrong-questions-btn');
        const hasEnough = currentSessionWrongQuestions.length >= MIN_WRONG_QUESTIONS_FOR_SIMULADO;
        const isReforco = currentQuestions?.[0]?.isWrongQuestion;
        const show = hasEnough && !isReforco && document.getElementById('results').style.display === 'block';
        btn.style.display = show ? 'block' : 'none';
        if (show) btn.innerHTML = `⚡ Reforço (${currentSessionWrongQuestions.length})`;
    }
    
    function updateContinuarBancoButton() {
        const btn = document.getElementById('continuar-banco-btn');
        const used = [...new Set(usedQuestionsHistory)].length;
        const remaining = Math.max(0, masterBank.length - used);
        const show = document.getElementById('results').style.display === 'block' && remaining > 0;
        btn.style.display = show ? 'block' : 'none';
        if (show) btn.innerHTML = `📚 Continuar (${remaining})`;
    }
    
    function removePendingShortcut() { document.getElementById('pending-shortcut')?.remove(); }
    
    function checkAndShowPendingButton() {
        if (!currentQuestions?.length) return;
        const pending = userAnswers.filter(a => a === null).length;
        const isLast = currentQuestionIndex === currentQuestions.length - 1;
        const hasAnsweredLast = userAnswers[currentQuestions.length - 1] !== null;
        removePendingShortcut();
        if (isLast && hasAnsweredLast && pending > 0 && document.getElementById('results').style.display !== 'block') {
            const div = document.createElement('div');
            div.id = 'pending-shortcut';
            div.className = 'pending-shortcut';
            div.onclick = goToNextPending;
            div.innerHTML = `<span>⚠️ ${pending}</span><span class="pending-count">IR AGORA</span><span>→</span>`;
            document.body.appendChild(div);
        }
    }
    
    function goToNextPending() {
        const pending = [];
        for (let i = 0; i < currentQuestions.length; i++) if (userAnswers[i] === null) pending.push(i);
        if (!pending.length) { removePendingShortcut(); return; }
        currentQuestionIndex = pending.find(i => i > currentQuestionIndex) ?? pending[0];
        saveAndRender();
    }
    
    function saveAndRender() {
        autoSaveProgress();
        renderCurrentQuestion();
        updateCounters();
        updateNavButtons();
        setTimeout(checkAndShowPendingButton, 100);
    }
    
    // ============================================
    // NAVEGAÇÃO
    // ============================================
    function startTimer() {
        clearInterval(timerId);
        timerId = setInterval(() => {
            timeLeft--;
            if (timeLeft % 10 === 0) autoSaveProgress();
            updateTimerDisplay();
            if (timeLeft <= 0) {
                clearInterval(timerId);
                if (getAnsweredCount() === currentQuestions.length) finalizeQuiz();
                else if (confirm('⏰ Tempo esgotado! Finalizar?')) finalizeQuiz();
            }
        }, 1000);
    }
    
    function nextQuestion() {
        if (currentQuestionIndex < currentQuestions.length - 1) {
            currentQuestionIndex++;
            saveAndRender();
        }
    }
    
    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            saveAndRender();
        }
    }
    
    function selectAnswer(idx) {
        userAnswers[currentQuestionIndex] = idx;
        autoSaveProgress();
        updateCounters();
        updateFinishButton();
        if (autoNavEnabled && currentQuestionIndex < currentQuestions.length - 1) {
            setTimeout(() => nextQuestion(), 200);
        }
        checkAndShowPendingButton();
    }
    
    function toggleAutoNav() {
        autoNavEnabled = !autoNavEnabled;
        document.getElementById('auto-nav-checkbox').checked = autoNavEnabled;
        autoSaveProgress();
    }
    
    function renderCurrentQuestion() {
        const container = document.getElementById('quiz-content');
        if (!currentQuestions?.length) { container.innerHTML = '<div class="question-block-mini">⚠️ Nenhuma questão</div>'; return; }
        const q = currentQuestions[currentQuestionIndex];
        container.innerHTML = `
            <div class="question-block-mini">
                <div class="question-text-mini">${currentQuestionIndex + 1}. ${q.q}</div>
                <div class="options-mini">
                    ${q.a.map((opt, i) => `
                        <label class="option-mini">
                            <input type="radio" name="q" value="${i}" ${userAnswers[currentQuestionIndex] === i ? 'checked' : ''} onchange="selectAnswer(${i})">
                            ${opt}
                        </label>
                    `).join('')}
                </div>
                <button class="report-btn" onclick="openReportModal(${currentQuestionIndex})"><span>⚠️</span> Reportar</button>
            </div>
        `;
        checkAndShowPendingButton();
    }
    
    // ============================================
    // FINALIZAR
    // ============================================
    function finalizeQuiz() {
        clearInterval(timerId);
        if (getAnsweredCount() !== currentQuestions.length && !confirm(`Faltam ${currentQuestions.length - getAnsweredCount()}. Finalizar?`)) {
            startTimer();
            return;
        }
        removePendingShortcut();
        let finalScore = 0;
        const sessionErrors = [];
        userAnswers.forEach((ans, i) => {
            if (ans !== null && ans === currentQuestions[i].c) finalScore++;
            else if (ans !== null && currentQuestions[i].originalIndex !== undefined) sessionErrors.push(currentQuestions[i].originalIndex);
        });
        currentSessionWrongQuestions = [...new Set(sessionErrors)];
        const percent = Math.round((finalScore / currentQuestions.length) * 100);
        const fb = document.getElementById('feedback-msg');
        if (percent >= 70) fb.innerHTML = "🎉 Excelente!";
        else if (percent >= 50) fb.innerHTML = "👍 Quase lá!";
        else fb.innerHTML = "💪 Continue praticando!";
        clearAutoSave();
        let quizHTML = '';
        currentQuestions.forEach((q, idx) => {
            const ua = userAnswers[idx];
            const isCorrect = ua === q.c;
            let opts = '';
            q.a.forEach((opt, i) => {
                let cls = 'option-mini';
                if (i === q.c) cls += ' correct-answer';
                else if (ua === i && !isCorrect) cls += ' wrong-answer';
                opts += `<label class="${cls}"><input type="radio" disabled ${ua === i ? 'checked' : ''}> ${opt}${ua === i ? ' <span style="font-size:0.6rem;">(sua)</span>' : ''}${i === q.c && ua !== i ? ' <span style="font-size:0.6rem; color:var(--success);">(correta)</span>' : ''}</label>`;
            });
            quizHTML += `<div class="question-block-mini"><div class="question-text-mini">${idx+1}. ${q.q}</div><div class="options-mini">${opts}</div><button class="results-report-btn" onclick="openReportModal(${idx})"><span>⚠️</span> Reportar</button></div>`;
        });
        document.getElementById('quiz-content').innerHTML = quizHTML;
        document.getElementById('final-score').textContent = `${finalScore}/${currentQuestions.length}`;
        document.getElementById('final-percent').textContent = `${percent}% de acertos`;
        
        const motivationElement = document.getElementById('motivation-message');
        if (currentQuestions[0]?.isWrongQuestion) {
            if (percent >= MIN_PERCENT_FOR_SUCCESS) {
                motivationElement.innerHTML = '✅ <strong>PARABÉNS!</strong> Você superou suas dificuldades!';
            } else {
                motivationElement.innerHTML = `⚡ <strong>PRECISA MELHORAR</strong><br>Acertou ${finalScore}/${currentQuestions.length}.<br>Faltam ${MIN_PERCENT_FOR_SUCCESS - percent}% para a meta.`;
            }
        } else {
            if (percent >= MIN_PERCENT_FOR_SUCCESS) {
                motivationElement.innerHTML = '🎯 <strong>ÓTIMO DESEMPENHO!</strong> Continue assim!';
            } else {
                motivationElement.innerHTML = '📚 <strong>CONTINUE ESTUDANDO!</strong> Você vai conseguir!';
            }
        }
        
        const total = masterBank.length;
        const used = [...new Set(usedQuestionsHistory)].length;
        const remaining = Math.max(0, total - used);
        const wrongCount = currentSessionWrongQuestions.length;
        let summaryText = '';
        if (currentQuestions[0]?.isWrongQuestion) {
            summaryText = `⚡ <strong>SIMULADO DE REFORÇO</strong><br>Você revisou ${currentQuestions.length} questões.<br>Ainda erradas: <strong>${wrongCount}</strong>`;
        } else if (remaining === 0) {
            summaryText = `🎯 <strong>COMPLETOU TODAS AS ${total} QUESTÕES!</strong><br>Erradas: <strong>${wrongCount}</strong>`;
        } else {
            summaryText = `📊 Restam: <strong>${remaining}</strong> | Usadas: <strong>${used}</strong><br>❌ Erros neste simulado: <strong>${wrongCount}</strong>`;
        }
        document.getElementById('simulado-summary').innerHTML = summaryText;
        document.querySelector('.nav-buttons').style.display = 'none';
        document.getElementById('results').style.display = 'block';
        document.getElementById('finish-btn').style.display = 'none';
        document.getElementById('restart-btn').style.display = 'block';
        updateSimuladoInfo();
        updateReforcoButton();
        updateContinuarBancoButton();
        const showReiniciarBanco = (currentQuestions[0]?.isWrongQuestion && percent < MIN_PERCENT_FOR_SUCCESS);
        document.getElementById('reiniciar-banco-btn').style.display = showReiniciarBanco ? 'block' : 'none';
        const voltarBtn = document.getElementById('voltar-inicio-btn');
        if (voltarBtn) voltarBtn.style.display = 'none';
    }
    
    // ============================================
    // AÇÕES DOS BOTÕES
    // ============================================
    function resetQuiz() {
        if (!confirm('Reiniciar este simulado?')) return;
        userAnswers.fill(null);
        timeLeft = TIME_LIMIT;
        currentQuestionIndex = 0;
        hasReachedEnd = false;
        document.getElementById('results').style.display = 'none';
        document.getElementById('finish-btn').style.display = 'block';
        document.getElementById('restart-btn').style.display = 'none';
        document.querySelector('.nav-buttons').style.display = 'grid';
        removePendingShortcut();
        autoSaveProgress();
        startTimer();
        renderCurrentQuestion();
        updateCounters();
        updateNavButtons();
        updateFinishButton();
    }
    
    function startNewQuiz() {
        document.getElementById('results').style.display = 'none';
        document.getElementById('finish-btn').style.display = 'block';
        document.getElementById('restart-btn').style.display = 'none';
        document.querySelector('.nav-buttons').style.display = 'grid';
        userAnswers.fill(null);
        timeLeft = TIME_LIMIT;
        currentQuestionIndex = 0;
        removePendingShortcut();
        startTimer();
        renderCurrentQuestion();
        updateCounters();
        updateNavButtons();
        updateFinishButton();
    }
    
    function showHistoryInfo() {
        const total = masterBank.length;
        const used = [...new Set(usedQuestionsHistory)].length;
        alert(`📊 Total: ${total} | Usadas: ${used} | Disponíveis: ${Math.max(0,total-used)} | Erros: ${currentSessionWrongQuestions.length}`);
    }
    
    function clearHistory() {
        if (!confirm('Limpar TODO o histórico? Isso reiniciará tudo.')) return;
        usedQuestionsHistory = [];
        localStorage.setItem(HISTORY_KEY, JSON.stringify(usedQuestionsHistory));
        clearAutoSave();
        resetCurrentSessionWrongQuestions();
        document.getElementById('results').style.display = 'none';
        document.getElementById('finish-btn').style.display = 'block';
        document.getElementById('restart-btn').style.display = 'none';
        document.querySelector('.nav-buttons').style.display = 'grid';
        currentQuestions = selectRandomQuestions(true);
        if (!currentQuestions.length) { alert("Erro!"); return; }
        userAnswers = new Array(currentQuestions.length).fill(null);
        currentQuestionIndex = 0;
        TIME_LIMIT = calculateTimeLimit(currentQuestions.length);
        timeLeft = TIME_LIMIT;
        autoNavEnabled = true;
        currentSimuladoNumber = 1;
        removePendingShortcut();
        syncPageTitle();
        updatePageTitle();
        updateSimuladoInfo();
        startTimer();
        renderCurrentQuestion();
        updateCounters();
        updateNavButtons();
        updateFinishButton();
        alert('✅ Histórico limpo!');
    }
    
    function continuarComBanco() {
        const total = masterBank.length;
        const used = [...new Set(usedQuestionsHistory)].length;
        const remaining = Math.max(0, total - used);
        if (remaining === 0) {
            if (confirm(`Todas as ${total} questões foram usadas. Reiniciar?`)) {
                usedQuestionsHistory = [];
                localStorage.setItem(HISTORY_KEY, JSON.stringify(usedQuestionsHistory));
                startNewSimulado();
            }
        } else {
            if (confirm(`Continuar com ${remaining} questões restantes?`)) startNewSimulado();
        }
    }
    
    function startNewSimulado() {
        resetCurrentSessionWrongQuestions();
        clearAutoSave();
        document.getElementById('results').style.display = 'none';
        document.getElementById('finish-btn').style.display = 'block';
        document.getElementById('restart-btn').style.display = 'none';
        document.querySelector('.nav-buttons').style.display = 'grid';
        currentQuestions = selectRandomQuestions(false);
        if (!currentQuestions.length) { alert("Erro!"); return; }
        userAnswers = new Array(currentQuestions.length).fill(null);
        currentQuestionIndex = 0;
        TIME_LIMIT = calculateTimeLimit(currentQuestions.length);
        timeLeft = TIME_LIMIT;
        autoNavEnabled = true;
        removePendingShortcut();
        updatePageTitle();
        updateSimuladoInfo();
        startTimer();
        renderCurrentQuestion();
        updateCounters();
        updateNavButtons();
        updateFinishButton();
        alert(`✅ Novo simulado com ${currentQuestions.length} questões!`);
    }
    
    function startWrongQuestionsSimulado() {
        currentQuestions = generateWrongQuestionsSimulado();
        if (!currentQuestions.length) { alert('Nenhuma questão errada.'); return; }
        currentSimuladoNumber = totalSimulados + 1;
        userAnswers = new Array(currentQuestions.length).fill(null);
        currentQuestionIndex = 0;
        TIME_LIMIT = calculateTimeLimit(currentQuestions.length);
        timeLeft = TIME_LIMIT;
        autoNavEnabled = true;
        removePendingShortcut();
        document.getElementById('results').style.display = 'none';
        document.getElementById('finish-btn').style.display = 'block';
        document.getElementById('restart-btn').style.display = 'none';
        document.querySelector('.nav-buttons').style.display = 'grid';
        updateSimuladoInfo();
        startTimer();
        renderCurrentQuestion();
        updateCounters();
        updateNavButtons();
        updateFinishButton();
        alert(`⚡ Reforço com ${currentQuestions.length} questões!`);
    }
    
    function voltarAoInicio() {
        if (!confirm('Voltar ao início? Todo progresso será perdido.')) return;
        usedQuestionsHistory = [];
        localStorage.setItem(HISTORY_KEY, JSON.stringify(usedQuestionsHistory));
        resetCurrentSessionWrongQuestions();
        clearAutoSave();
        document.getElementById('results').style.display = 'none';
        document.getElementById('finish-btn').style.display = 'block';
        document.getElementById('restart-btn').style.display = 'none';
        document.querySelector('.nav-buttons').style.display = 'grid';
        currentQuestions = selectRandomQuestions(true);
        if (!currentQuestions.length) { alert("Erro!"); return; }
        userAnswers = new Array(currentQuestions.length).fill(null);
        currentQuestionIndex = 0;
        TIME_LIMIT = calculateTimeLimit(currentQuestions.length);
        timeLeft = TIME_LIMIT;
        autoNavEnabled = true;
        currentSimuladoNumber = 1;
        removePendingShortcut();
        startTimer();
        renderCurrentQuestion();
        updateCounters();
        updateNavButtons();
        updateFinishButton();
        updateSimuladoInfo();
        alert('✅ Sistema reiniciado!');
    }
    
    function reiniciarBancoCompleto() { voltarAoInicio(); }
    
    // ============================================
    // INICIALIZAÇÃO
    // ============================================
    function initQuiz() {
        syncPageTitle();
        loadDarkModePreference();
        if (!masterBank.length) {
            document.getElementById('quiz-content').innerHTML = '<div class="question-block-mini" style="text-align:center;color:var(--danger);">⚠️ Banco vazio! Adicione questões no array masterBank</div>';
            return;
        }
        calcularConfiguracaoSimulados();
        const saved = localStorage.getItem(HISTORY_KEY);
        if (saved) try { usedQuestionsHistory = JSON.parse(saved); } catch(e) { usedQuestionsHistory = []; }
        resetCurrentSessionWrongQuestions();
        if (!loadAutoSaveProgress()) {
            currentQuestions = selectRandomQuestions();
            if (!currentQuestions.length) return;
            userAnswers = new Array(currentQuestions.length).fill(null);
            currentQuestionIndex = 0;
            TIME_LIMIT = calculateTimeLimit(currentQuestions.length);
            timeLeft = TIME_LIMIT;
            autoNavEnabled = true;
        }
        updatePageTitle();
        document.getElementById('timer').textContent = formatTime(timeLeft);
        document.getElementById('auto-nav-checkbox').checked = autoNavEnabled;
        updateSimuladoInfo();
        startTimer();
        renderCurrentQuestion();
        updateCounters();
        updateNavButtons();
        updateFinishButton();
        updateReforcoButton();
        updateContinuarBancoButton();
    }
    
    window.initQuiz = initQuiz;
    window.onload = initQuiz;
</script>
</body>
</html>
